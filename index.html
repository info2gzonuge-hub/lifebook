  <!-- 动态生成彩虹图标（确保主屏幕正确显示） -->
  <script>
    (function() {
      // 生成彩虹渐变圆形图标并转为Blob URL，同时设置apple-touch-icon和manifest
      function generateIconDataURL(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#ffd9e8');
        gradient.addColorStop(1, '#ffa6c9');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2.2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#b3415c';
        ctx.font = `bold ${size*0.5}px "Segoe UI", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🌈', size/2, size/2);
        return canvas.toDataURL('image/png');
      }
      const icon180 = generateIconDataURL(180);
      const icon512 = generateIconDataURL(512);
      const appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      appleIcon.href = icon180;
      document.head.appendChild(appleIcon);
      const manifest = {
        name: '全能生活本', short_name: '全能本', start_url: '.', display: 'standalone',
        theme_color: '#ffd9e8', background_color: '#ffe0ec',
        icons: [
          { src: icon180, sizes: '180x180', type: 'image/png' },
          { src: icon512, sizes: '512x512', type: 'image/png' }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const manifestURL = URL.createObjectURL(blob);
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = manifestURL;
      document.head.appendChild(manifestLink);
    })();
  </script>

    .symptom-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0; }

    .period-modal-buttons button { background: none; border-radius: 60px; padding: 6px 12px; font-size: 14px; font-weight: 600; cursor: pointer; border: 2px solid #f7ad6a; }
    .period-modal-buttons button:first-child { background: #b8e0b0; }
    .period-modal-buttons button:last-child { background: #ffefdb; }
    .expand-important-btn { background: linear-gradient(135deg, #FFB27A, #FF8C42); border: none; border-radius: 60px; padding: 10px 20px; font-weight: 800; color: white; margin-bottom: 16px; width: 100%; cursor: pointer; }
    .rank-card { background: rgba(255,245,235,0.9); border-radius: 32px; padding: 16px; margin: 12px 0; border: 2px solid var(--card-border); }
    .rank-title { font-weight: 800; margin-bottom: 10px; color: var(--stat-label); font-size: 1.1rem; }
    .rank-mode-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 12px; }
    .rank-mode-btn { background: #fff0df; border: 2px solid #f7ad6a; border-radius: 40px; padding: 6px 18px; font-weight: 700; font-size: 0.85rem; cursor: pointer; color: var(--stat-label); }
    .rank-mode-btn.active { background: var(--cat-active); color: white; border-color: #b45a2b; }
    .rank-time-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 8px 0 16px 0; }

    .rank-arrow { background: #ffefdb; border: 1px solid #f7ad6a; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; font-weight: bold; cursor: pointer; color: var(--stat-label); }

    .rank-bar-wrapper { flex: 1; background: #ffe6d5; border-radius: 30px; height: 28px; overflow: hidden; }
    .rank-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #FF9A6E, #FF6F4A); border-radius: 30px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; color: white; font-size: 0.7rem; font-weight: bold; }
    .rank-amount { min-width: 70px; text-align: right; font-weight: 700; color: #b3415c; }
    .no-data-rank { text-align: center; padding: 20px; color: #b87a4a; }

</head>

<script>
(function(){
  // 存储KEY
  const STORAGE_KEY = 'dopa_work_v17';
  const BK_STORAGE_KEY = 'dopa_bookkeeping_v8';
  const NOTE_STORAGE_KEY = 'dopa_note_v5';
  const TODO_STORAGE_KEY = 'dopa_todo_v2';
  const PASSWORD_KEY = 'dopa_password';
  const PASSWORD_ENABLED_KEY = 'dopa_password_enabled';
  const PERIOD_STORAGE_KEY = 'dopa_period_v2';
  const IMPORTANT_STORAGE_KEY = 'dopa_important_v1';
  const THEME_KEY = 'dopa_theme';
  const WORK_CATEGORIES_KEY = 'work_categories_v1';

  let workCategories = [];
  let records = {};
  let bkRecords = [];
  let todoCategories = ['工作','生活','学习','购物'];
  let todos = [];
  let menstrualData = {};
  let importantDays = [];
  let cycleLength = 28, periodDays = 7;
  let noteCategories = ['投资', '个人', '工作', '灵感'];
  let notes = [];
  let currentNoteId = null, currentNoteCategoryId = noteCategories[0], currentTodoCat = '工作';

  let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
  let selectedDateStr = '', editingRecordId = null;
  let passwordEnabled = false, savedPassword = '', isUnlocked = true;
  let currentBkYear = new Date().getFullYear(), currentBkMonth = new Date().getMonth(), currentBkType = 'expense', currentBkCategory = '';
  let workDisplayYear = currentYear, workDisplayMonth = currentMonth;
  let girlDisplayYear = currentYear, girlDisplayMonth = currentMonth, girlCurrentMode = 'period';
  let expenseChart, incomeChart, categoryChart;
  let currentSelectedWorkDate = null;
  let bkChartMode = 'month', workChartMode = 'month';
  
  let rankMode = 'month';
  let rankYear = currentBkYear;
  let rankMonth = currentBkMonth;

  const expenseCategories = ['餐饮','日用','交通','通讯','购物','娱乐','医疗','奶茶','零食','礼物','汽车','其他'];
  const incomeCategories = ['工资','兼职','红包','理财','奖金','其他'];

  function haptic() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10); }
  function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'>'); }
  function formatDateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
  function getFirstDayIndex(y,m){ let d=new Date(y,m,1).getDay(); return d===0?7:d; }
  function getDaySummary(key){ let h=0,inc=0; (records[key]||[]).forEach(r=>{ h+=r.hours||0; inc+=r.income||0; }); return {hours:h,income:inc}; }
  function saveToLocal(key,data){ localStorage.setItem(key, JSON.stringify(data)); }
  function loadFromLocal(key,def){ const s=localStorage.getItem(key); return s?JSON.parse(s):def; }

  function loadAll(){
    workCategories = loadFromLocal(WORK_CATEGORIES_KEY, []);
    if(workCategories.length === 0) workCategories = [{ id: 'cat1', name: '达美乐', hourlyRate: 19 },{ id: 'cat2', name: '美团', hourlyRate: 19 }];
    records = loadFromLocal(STORAGE_KEY, {});
    bkRecords = loadFromLocal(BK_STORAGE_KEY, []);
    const rawNote = loadFromLocal(NOTE_STORAGE_KEY, null);
    if(rawNote && rawNote.categories && Array.isArray(rawNote.notes)){
      let mergedCats = [...rawNote.categories];
      if(!mergedCats.includes('投资')) mergedCats.unshift('投资');
      const ordered = ['投资', '个人', '工作', '灵感'];
      const finalCats = [];
      for(let cat of ordered) if(mergedCats.includes(cat)) finalCats.push(cat);
      for(let cat of mergedCats) if(!finalCats.includes(cat)) finalCats.push(cat);
      noteCategories = finalCats;
      notes = rawNote.notes;
    } else { notes = []; saveToLocal(NOTE_STORAGE_KEY, { categories: noteCategories, notes }); }
    currentNoteId = notes.length > 0 ? notes[0].id : null;
    currentNoteCategoryId = noteCategories[0];
    const todoData = loadFromLocal(TODO_STORAGE_KEY, { categories: ['工作','生活','学习','购物'], todos: [] });
    todoCategories = todoData.categories; todos = todoData.todos;
    const periodData = loadFromLocal(PERIOD_STORAGE_KEY, { menstrualData: {}, cycleLength: 28, periodDays: 7 });
    menstrualData = periodData.menstrualData; cycleLength = periodData.cycleLength; periodDays = periodData.periodDays;
    importantDays = loadFromLocal(IMPORTANT_STORAGE_KEY, []);
    passwordEnabled = localStorage.getItem(PASSWORD_ENABLED_KEY)==='true';
    savedPassword = localStorage.getItem(PASSWORD_KEY)||'';
    isUnlocked = !passwordEnabled;
    currentTodoCat = todoCategories[0] || '工作';
    const savedTheme = localStorage.getItem(THEME_KEY) || 'default';
    document.body.classList.remove('theme-mint','theme-sky');
    if(savedTheme === 'mint') document.body.classList.add('theme-mint');
    else if(savedTheme === 'sky') document.body.classList.add('theme-sky');
  }
  function saveAll(){
    saveToLocal(WORK_CATEGORIES_KEY, workCategories);
    saveToLocal(STORAGE_KEY, records);
    saveToLocal(BK_STORAGE_KEY, bkRecords);
    saveToLocal(NOTE_STORAGE_KEY, { categories: noteCategories, notes });
    saveToLocal(TODO_STORAGE_KEY, { categories: todoCategories, todos });
    saveToLocal(PERIOD_STORAGE_KEY, { menstrualData, cycleLength, periodDays });
    saveToLocal(IMPORTANT_STORAGE_KEY, importantDays);
    localStorage.setItem(PASSWORD_ENABLED_KEY, passwordEnabled);
    localStorage.setItem(PASSWORD_KEY, savedPassword);
  }

  // 日期输入框默认显示今天（不随月份切换重置）
  function setDefaultDateInput() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const dateInput = document.getElementById('bkDate');
    if(dateInput && !dateInput.value) dateInput.value = `${yyyy}-${mm}-${dd}`;
  }

  function renderBkYearlySummary(){
    const mode = bkChartMode;
    const container = document.getElementById('bkTableContainer');
    if(mode === 'month'){
      const year = parseInt(document.getElementById('bkYearlyYearSelect').value);
      const monthly = Array(12).fill().map(()=>({income:0,expense:0}));
      bkRecords.forEach(r=>{ const d = new Date(r.date); if(d.getFullYear() === year){ const m = d.getMonth(); if(r.type==='income') monthly[m].income += r.amount; else monthly[m].expense += r.amount; } });
      let totalInc = monthly.reduce((s,m)=>s+m.income,0);
      let totalExp = monthly.reduce((s,m)=>s+m.expense,0);
      let totalBal = totalInc - totalExp;
      let html = '<table class="data-table"><thead><tr><th>月份</th><th>收入(¥)</th><th>支出(¥)</th><th>结余(¥)</th><tr></thead><tbody>';
      for(let i=0;i<12;i++){
        const inc = monthly[i].income, exp = monthly[i].expense, bal = inc - exp;
        const balColor = bal > 0 ? '#2a7f4a' : (bal < 0 ? '#e06c3c' : 'inherit');
        html += `<tr><td style="font-weight:600;">${i+1}月</td><td>${inc.toFixed(2)}</td><td>${exp.toFixed(2)}</td><td style="color:${balColor}">${bal.toFixed(2)}</td></tr>`;
      }
      html += `</tbody><tfoot><tr style="background:#ffefdb; font-weight:800;"><td>总计</td><td>${totalInc.toFixed(2)}</td><td>${totalExp.toFixed(2)}</td><td style="color:${totalBal>=0?'#2a7f4a':'#e06c3c'}">${totalBal.toFixed(2)}</td></tr></tfoot>`;
      container.innerHTML = html;
    } else {
      let startYear = parseInt(document.getElementById('bkYearStartSelect').value);
      let endYear = parseInt(document.getElementById('bkYearEndSelect').value);
      if(startYear > endYear) { [startYear, endYear] = [endYear, startYear]; document.getElementById('bkYearStartSelect').value = startYear; document.getElementById('bkYearEndSelect').value = endYear; }
      let years = []; for(let y=startYear; y<=endYear; y++) years.push(y);
      const yearData = years.map(y=>{ let inc=0, exp=0; bkRecords.forEach(r=>{ const d = new Date(r.date); if(d.getFullYear() === y){ if(r.type==='income') inc+=r.amount; else exp+=r.amount; } }); return { year:y, income:inc, expense:exp, balance:inc-exp }; });
      let totalInc = yearData.reduce((s,d)=>s+d.income,0);
      let totalExp = yearData.reduce((s,d)=>s+d.expense,0);
      let totalBal = totalInc - totalExp;
      let html = '<table class="data-table"><thead><tr><th>年份</th><th>总收入(¥)</th><th>总支出(¥)</th><th>结余(¥)</th></tr></thead><tbody>';
      yearData.forEach(d=>{ const balColor = d.balance > 0 ? '#2a7f4a' : (d.balance < 0 ? '#e06c3c' : 'inherit'); html += `<tr><td style="font-weight:600;">${d.year}</td><td>${d.income.toFixed(2)}</td><td>${d.expense.toFixed(2)}</td><td style="color:${balColor}">${d.balance.toFixed(2)}</td></tr>`; });
      html += `</tbody><tfoot><tr style="background:#ffefdb; font-weight:800;"><td>总计</td><td>${totalInc.toFixed(2)}</td><td>${totalExp.toFixed(2)}</td><td style="color:${totalBal>=0?'#2a7f4a':'#e06c3c'}">${totalBal.toFixed(2)}</td></tr></tfoot>`;
      container.innerHTML = html;
    }
  }
  function renderBkCategoryGrid(){
    const cats = currentBkType==='expense'?expenseCategories:incomeCategories;
    document.getElementById('bkCategoryGrid').innerHTML = cats.map(cat => `<div class="cat-icon ${currentBkCategory===cat?'active':''}" data-category="${cat}">${cat}</div>`).join('');
    document.querySelectorAll('#bkCategoryGrid .cat-icon').forEach(el=>el.addEventListener('click',()=>{ document.querySelectorAll('#bkCategoryGrid .cat-icon').forEach(c=>c.classList.remove('active')); el.classList.add('active'); currentBkCategory = el.dataset.category; haptic(); }));
    if(!currentBkCategory && cats.length) currentBkCategory = cats[0];
    const first = document.querySelector('#bkCategoryGrid .cat-icon'); if(first) first.classList.add('active');
  }
  function refreshBookkeepingUI(){
    const recs = bkRecords.filter(r=>{let d=new Date(r.date); return d.getFullYear()===currentBkYear && d.getMonth()===currentBkMonth;});
    let inc=0,exp=0,incMap=new Map(),expMap=new Map();
    recs.forEach(r=>{ if(r.type==='income'){ inc+=r.amount; incMap.set(r.category,(incMap.get(r.category)||0)+r.amount); } else { exp+=r.amount; expMap.set(r.category,(expMap.get(r.category)||0)+r.amount); } });
    document.getElementById('monthIncomeBk').innerText=inc.toFixed(2);
    document.getElementById('monthExpenseBk').innerText=exp.toFixed(2);
    document.getElementById('monthBalanceBk').innerText=(inc-exp).toFixed(2);
    if(expenseChart) expenseChart.destroy();
    if(incomeChart) incomeChart.destroy();
    expenseChart = new Chart(document.getElementById('expensePieChart'),{ type:'pie', data:{ labels:Array.from(expMap.keys()), datasets:[{ data:Array.from(expMap.values()), backgroundColor:['#FFB3BA','#C5E99B','#B5E3FF','#FFD6A5','#D4B8D4','#A7E0E0','#FBC8B5','#C9C9C9','#F4A261','#E9C46A','#2A9D8F','#E76F51'] }] }, options:{ plugins:{ legend:{ display: false }, tooltip:{ callbacks:{ label: (ctx) => { const label = ctx.label || ''; const value = ctx.raw; const percent = exp > 0 ? ((value / exp) * 100).toFixed(1) : 0; return `${label}: ¥${value.toFixed(2)} (${percent}%)`; } } } } } });
    incomeChart = new Chart(document.getElementById('incomePieChart'),{ type:'pie', data:{ labels:Array.from(incMap.keys()), datasets:[{ data:Array.from(incMap.values()), backgroundColor:['#9AD0F5','#C5E99B','#FFD966','#F4ACB7','#FFB347','#B0A8B9'] }] }, options:{ plugins:{ legend:{ display: false }, tooltip:{ callbacks:{ label: (ctx) => { const label = ctx.label || ''; const value = ctx.raw; const percent = inc > 0 ? ((value / inc) * 100).toFixed(1) : 0; return `${label}: ¥${value.toFixed(2)} (${percent}%)`; } } } } } });
    renderExpenseRanking();
  }
  function addBookkeeping(){ 
    if(!currentBkCategory){ alert('请选择分类'); return; } 
    let amount=parseFloat(document.getElementById('bkAmount').value); 
    if(isNaN(amount)||amount<=0) return; 
    let userDate = document.getElementById('bkDate').value;
    if(!userDate){
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      userDate = `${yyyy}-${mm}-${dd}`;
    }
    bkRecords.push({
      id:Date.now(),
      type:currentBkType,
      category:currentBkCategory,
      amount,
      date:userDate,
      note:document.getElementById('bkNote').value.trim()
    }); 
    saveAll(); 
    refreshBookkeepingUI(); 
    renderBkYearlySummary(); 
    document.getElementById('bkAmount').value=''; 
    document.getElementById('bkNote').value=''; 
    haptic(); 
  }
  function changeBkMonth(delta){ 
    let nm=currentBkMonth+delta, ny=currentBkYear; 
    if(nm<0){ nm=11; ny--; } 
    if(nm>11){ nm=0; ny++; } 
    currentBkYear=ny; currentBkMonth=nm; 
    document.getElementById('currentMonthBk').innerText=`${currentBkYear}年 ${currentBkMonth+1}月`; 
    refreshBookkeepingUI();
    if(rankMode === 'month') { rankYear = currentBkYear; rankMonth = currentBkMonth; renderExpenseRanking(); }
    else { rankYear = currentBkYear; renderExpenseRanking(); }
  }
  function showRecordModal(){
    const recs = bkRecords.filter(r=>{let d=new Date(r.date); return d.getFullYear()===currentBkYear && d.getMonth()===currentBkMonth;});
    if(!recs.length){ alert('本月无记录'); return; }
    const container = document.getElementById('recordListContainer');
    container.innerHTML = recs.map(r=>`<div class="modal-record-item"><div><strong>${r.type==='income'?'💰收入':'💸支出'}</strong> ${r.category} ${r.note?`· ${escapeHtml(r.note)}`:''}<br>${r.date} ¥${r.amount.toFixed(2)}</div><div><button class="delete-record" data-id="${r.id}">🗑️</button></div></div>`).join('');
    document.querySelectorAll('.delete-record').forEach(btn=>btn.addEventListener('click',()=>{ bkRecords=bkRecords.filter(r=>r.id!=btn.dataset.id); saveAll(); refreshBookkeepingUI(); renderBkYearlySummary(); showRecordModal(); }));
    document.getElementById('recordModal').classList.add('show');
  }
  function renderExpenseRanking() {
    let container = document.getElementById('expenseRankingContainer');
    if(!container) return;
    let catAmounts = new Map();
    if(rankMode === 'month') {
      let year = rankYear, month = rankMonth;
      let startDate = new Date(year, month, 1);
      let endDate = new Date(year, month+1, 0);
      bkRecords.forEach(r => {
        if(r.type === 'expense') {
          let d = new Date(r.date);
          if(d >= startDate && d <= endDate) {
            catAmounts.set(r.category, (catAmounts.get(r.category)||0) + r.amount);
          }
        }
      });
    } else {
      let year = rankYear;
      bkRecords.forEach(r => {
        if(r.type === 'expense') {
          let d = new Date(r.date);
          if(d.getFullYear() === year) {
            catAmounts.set(r.category, (catAmounts.get(r.category)||0) + r.amount);
          }
        }
      });
    }
    let sorted = Array.from(catAmounts.entries()).sort((a,b)=>b[1]-a[1]);
    let maxAmount = sorted.length ? sorted[0][1] : 0;
    let html = `<div class="rank-title">📊 支出分类排行</div>`;
    html += `<div class="rank-mode-bar"><button class="rank-mode-btn ${rankMode==='month'?'active':''}" data-mode="month">📅 本月</button><button class="rank-mode-btn ${rankMode==='year'?'active':''}" data-mode="year">📆 全年</button></div>`;
    html += `<div class="rank-time-nav"><button class="rank-arrow" id="rankPrevBtn">←</button><span class="rank-time-text" id="rankTimeLabel"></span><button class="rank-arrow" id="rankNextBtn">→</button></div>`;
    if(sorted.length === 0) {
      html += `<div class="no-data-rank">✨ 暂无支出记录</div>`;
    } else {
      html += `<div class="rank-list">`;
      sorted.forEach(([cat, amount]) => {
        let percent = maxAmount > 0 ? (amount / maxAmount) * 100 : 0;
        html += `<div class="rank-item">
          <div class="rank-category">${escapeHtml(cat)}</div>
          <div class="rank-bar-wrapper"><div class="rank-bar-fill" style="width: ${percent}%;"></div></div>
          <div class="rank-amount">¥${amount.toFixed(2)}</div>
        </div>`;
      });
      html += `</div>`;
    }
    container.innerHTML = html;
    let rankTimeLabel = document.getElementById('rankTimeLabel');
    if(rankMode === 'month') rankTimeLabel.innerText = `${rankYear}年 ${rankMonth+1}月`;
    else rankTimeLabel.innerText = `${rankYear}年`;
    document.querySelectorAll('.rank-mode-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        rankMode = btn.dataset.mode;
        if(rankMode === 'month') { rankYear = currentBkYear; rankMonth = currentBkMonth; }
        else { rankYear = currentBkYear; }
        renderExpenseRanking();
        haptic();
      });
    });
    let prevBtn = document.getElementById('rankPrevBtn');
    let nextBtn = document.getElementById('rankNextBtn');
    if(prevBtn) prevBtn.onclick = () => {
      if(rankMode === 'month') {
        let newMonth = rankMonth - 1, newYear = rankYear;
        if(newMonth < 0) { newMonth = 11; newYear--; }
        rankYear = newYear; rankMonth = newMonth;
      } else { rankYear--; }
      renderExpenseRanking(); haptic();
    };
    if(nextBtn) nextBtn.onclick = () => {
      if(rankMode === 'month') {
        let newMonth = rankMonth + 1, newYear = rankYear;
        if(newMonth > 11) { newMonth = 0; newYear++; }
        rankYear = newYear; rankMonth = newMonth;
      } else { rankYear++; }
      renderExpenseRanking(); haptic();
    };
  }

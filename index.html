  <script>
    (function() {
      function generateIconDataURL(size) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, size, size);
        gradient.addColorStop(0, '#ffd9e8');
        gradient.addColorStop(1, '#ffa6c9');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2.2, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#b3415c';
        ctx.font = `bold ${size*0.5}px "Segoe UI", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('🌈', size/2, size/2);
        return canvas.toDataURL('image/png');
      }
      const icon180 = generateIconDataURL(180);
      const icon512 = generateIconDataURL(512);
      const appleIcon = document.createElement('link');
      appleIcon.rel = 'apple-touch-icon';
      appleIcon.href = icon180;
      document.head.appendChild(appleIcon);
      const manifest = {
        name: '全能生活本', short_name: '全能本', start_url: '.', display: 'standalone',
        theme_color: '#ffd9e8', background_color: '#ffe0ec',
        icons: [
          { src: icon180, sizes: '180x180', type: 'image/png' },
          { src: icon512, sizes: '512x512', type: 'image/png' }
        ]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const manifestURL = URL.createObjectURL(blob);
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = manifestURL;
      document.head.appendChild(manifestLink);
    })();
  </script>

    .expand-important-btn { background: linear-gradient(135deg, #FFB27A, #FF8C42); border: none; border-radius: 60px; padding: 10px 20px; font-weight: 800; color: white; margin-bottom: 16px; width: 100%; cursor: pointer; }
    .rank-card { background: rgba(255,245,235,0.9); border-radius: 32px; padding: 16px; margin: 12px 0; border: 2px solid var(--card-border); }
    .rank-title { font-weight: 800; margin-bottom: 10px; color: var(--stat-label); font-size: 1.1rem; }
    .rank-mode-bar { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 12px; }

    .rank-arrow { background: #ffefdb; border: 1px solid #f7ad6a; border-radius: 50%; width: 32px; height: 32px; font-size: 1rem; font-weight: bold; cursor: pointer; color: var(--stat-label); }

<script>
(function(){
  // 存储KEY
  const STORAGE_KEY = 'dopa_work_v17';
  const BK_STORAGE_KEY = 'dopa_bookkeeping_v8';
  const NOTE_STORAGE_KEY = 'dopa_note_v5';
  const TODO_STORAGE_KEY = 'dopa_todo_v2';
  const PASSWORD_KEY = 'dopa_password';
  const PASSWORD_ENABLED_KEY = 'dopa_password_enabled';
  const PERIOD_STORAGE_KEY = 'dopa_period_v2';
  const IMPORTANT_STORAGE_KEY = 'dopa_important_v1';
  const THEME_KEY = 'dopa_theme';
  const WORK_CATEGORIES_KEY = 'work_categories_v1';

  let workCategories = [];
  let records = {};
  let bkRecords = [];
  let todoCategories = ['工作','生活','学习','购物'];
  let todos = [];
  let menstrualData = {};
  let importantDays = [];
  let cycleLength = 28, periodDays = 7;
  let noteCategories = ['投资', '个人', '工作', '灵感'];
  let notes = [];
  let currentNoteId = null, currentNoteCategoryId = noteCategories[0], currentTodoCat = '工作';

  let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
  let selectedDateStr = '', editingRecordId = null;
  let passwordEnabled = false, savedPassword = '', isUnlocked = true;
  let currentBkYear = new Date().getFullYear(), currentBkMonth = new Date().getMonth(), currentBkType = 'expense', currentBkCategory = '';
  let workDisplayYear = currentYear, workDisplayMonth = currentMonth;
  let girlDisplayYear = currentYear, girlDisplayMonth = currentMonth, girlCurrentMode = 'period';
  let expenseChart, incomeChart, categoryChart, yearlyChart;
  let currentSelectedWorkDate = null;
  let bkChartMode = 'month', workChartMode = 'month';
  
  let rankMode = 'month';
  let rankYear = currentBkYear;
  let rankMonth = currentBkMonth;

  // 修改点：支出分类最后一项改为“住房”
  const expenseCategories = ['餐饮','日用','交通','通讯','购物','娱乐','医疗','奶茶','零食','礼物','汽车','住房'];
  const incomeCategories = ['工资','兼职','红包','理财','奖金','其他'];

  function haptic() { if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10); }
  function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'>'); }
  function formatDateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
  function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
  function getFirstDayIndex(y,m){ let d=new Date(y,m,1).getDay(); return d===0?7:d; }
  function getDaySummary(key){ let h=0,inc=0; (records[key]||[]).forEach(r=>{ h+=r.hours||0; inc+=r.income||0; }); return {hours:h,income:inc}; }
  function saveToLocal(key,data){ localStorage.setItem(key, JSON.stringify(data)); }
  function loadFromLocal(key,def){ const s=localStorage.getItem(key); return s?JSON.parse(s):def; }

  function loadAll(){
    workCategories = loadFromLocal(WORK_CATEGORIES_KEY, []);
    if(workCategories.length === 0) workCategories = [{ id: 'cat1', name: '达美乐', hourlyRate: 19 },{ id: 'cat2', name: '美团', hourlyRate: 19 }];
    records = loadFromLocal(STORAGE_KEY, {});
    bkRecords = loadFromLocal(BK_STORAGE_KEY, []);
    const rawNote = loadFromLocal(NOTE_STORAGE_KEY, null);
    if(rawNote && rawNote.categories && Array.isArray(rawNote.notes)){
      let mergedCats = [...rawNote.categories];
      if(!mergedCats.includes('投资')) mergedCats.unshift('投资');
      const ordered = ['投资', '个人', '工作', '灵感'];
      const finalCats = [];
      for(let cat of ordered) if(mergedCats.includes(cat)) finalCats.push(cat);
      for(let cat of mergedCats) if(!finalCats.includes(cat)) finalCats.push(cat);
      noteCategories = finalCats;
      notes = rawNote.notes;
    } else { notes = []; saveToLocal(NOTE_STORAGE_KEY, { categories: noteCategories, notes }); }
    currentNoteId = notes.length > 0 ? notes[0].id : null;
    currentNoteCategoryId = noteCategories[0];
    const todoData = loadFromLocal(TODO_STORAGE_KEY, { categories: ['工作','生活','学习','购物'], todos: [] });
    todoCategories = todoData.categories; todos = todoData.todos;
    const periodData = loadFromLocal(PERIOD_STORAGE_KEY, { menstrualData: {}, cycleLength: 28, periodDays: 7 });
    menstrualData = periodData.menstrualData; cycleLength = periodData.cycleLength; periodDays = periodData.periodDays;
    importantDays = loadFromLocal(IMPORTANT_STORAGE_KEY, []);
    passwordEnabled = localStorage.getItem(PASSWORD_ENABLED_KEY)==='true';
    savedPassword = localStorage.getItem(PASSWORD_KEY)||'';
    isUnlocked = !passwordEnabled;
    currentTodoCat = todoCategories[0] || '工作';
    const savedTheme = localStorage.getItem(THEME_KEY) || 'default';
    document.body.classList.remove('theme-mint','theme-sky');
    if(savedTheme === 'mint') document.body.classList.add('theme-mint');
    else if(savedTheme === 'sky') document.body.classList.add('theme-sky');
  }
  function saveAll(){
    saveToLocal(WORK_CATEGORIES_KEY, workCategories);
    saveToLocal(STORAGE_KEY, records);
    saveToLocal(BK_STORAGE_KEY, bkRecords);
    saveToLocal(NOTE_STORAGE_KEY, { categories: noteCategories, notes });
    saveToLocal(TODO_STORAGE_KEY, { categories: todoCategories, todos });
    saveToLocal(PERIOD_STORAGE_KEY, { menstrualData, cycleLength, periodDays });
    saveToLocal(IMPORTANT_STORAGE_KEY, importantDays);
    localStorage.setItem(PASSWORD_ENABLED_KEY, passwordEnabled);
    localStorage.setItem(PASSWORD_KEY, savedPassword);
  }

  // 日期输入框默认今天
  function setDefaultDateInput() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const dateInput = document.getElementById('bkDate');
    if(dateInput && !dateInput.value) dateInput.value = `${yyyy}-${mm}-${dd}`;
  }

  // 修正后的年度收支汇总（对齐 + 正红负绿）
  function renderBkYearlySummary(){
    const mode = bkChartMode;
    const container = document.getElementById('bkTableContainer');
    if(mode === 'month'){
      const year = parseInt(document.getElementById('bkYearlyYearSelect').value);

      yearData.forEach(d=>{ const balColor = d.balance > 0 ? '#e06c3c' : (d.balance < 0 ? '#2a7f4a' : 'inherit'); html += `<tr><td style="font-weight:600;">${d.year}</td><td>${d.income.toFixed(2)}</td><td>${d.expense.toFixed(2)}</td><td style="color:${balColor}">${d.balance.toFixed(2)}</td></tr>`; });
      const totalBalColor = totalBal > 0 ? '#e06c3c' : (totalBal < 0 ? '#2a7f4a' : 'inherit');
      html += `</tbody><tfoot><tr style="background:#ffefdb; font-weight:800;"><td>总计</td><td>${totalInc.toFixed(2)}</td><td>${totalExp.toFixed(2)}</td><td style="color:${totalBalColor}">${totalBal.toFixed(2)}</td></tr></tfoot>`;

  function renderExpenseRanking() {
    let container = document.getElementById('expenseRankingContainer');
    if(!container) return;
    let catAmounts = new Map();
    if(rankMode === 'month') {
      let year = rankYear, month = rankMonth;
      bkRecords.forEach(r => {
        if(r.type === 'expense') {
          let d = new Date(r.date);
          if(d.getFullYear() === year && d.getMonth() === month) {
            catAmounts.set(r.category, (catAmounts.get(r.category)||0) + r.amount);
          }
        }
      });
    } else {
      let year = rankYear;
      bkRecords.forEach(r => {
        if(r.type === 'expense') {
          let d = new Date(r.date);
          if(d.getFullYear() === year) {
            catAmounts.set(r.category, (catAmounts.get(r.category)||0) + r.amount);
          }
        }
      });
    }
    let sorted = Array.from(catAmounts.entries()).sort((a,b)=>b[1]-a[1]);
    let maxAmount = sorted.length ? sorted[0][1] : 0;
    let html = `<div class="rank-title">📊 支出分类排行</div>`;
    html += `<div class="rank-mode-bar"><button class="rank-mode-btn ${rankMode==='month'?'active':''}" data-mode="month">📅 本月</button><button class="rank-mode-btn ${rankMode==='year'?'active':''}" data-mode="year">📆 全年</button></div>`;
    html += `<div class="rank-time-nav"><button class="rank-arrow" id="rankPrevBtn">←</button><span class="rank-time-text" id="rankTimeLabel"></span><button class="rank-arrow" id="rankNextBtn">→</button></div>`;
    if(sorted.length === 0) {
      html += `<div class="no-data-rank">✨ 暂无支出记录</div>`;
    } else {
      html += `<div class="rank-list">`;
      sorted.forEach(([cat, amount]) => {
        let percent = maxAmount > 0 ? (amount / maxAmount) * 100 : 0;
        html += `<div class="rank-item">
          <div class="rank-category">${escapeHtml(cat)}</div>
          <div class="rank-bar-wrapper"><div class="rank-bar-fill" style="width: ${percent}%;"></div></div>
          <div class="rank-amount">¥${amount.toFixed(2)}</div>
        </div>`;
      });
      html += `</div>`;
    }
    container.innerHTML = html;
    let rankTimeLabel = document.getElementById('rankTimeLabel');
    if(rankMode === 'month') rankTimeLabel.innerText = `${rankYear}年 ${rankMonth+1}月`;
    else rankTimeLabel.innerText = `${rankYear}年`;
    document.querySelectorAll('.rank-mode-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        rankMode = btn.dataset.mode;
        if(rankMode === 'month') { rankYear = currentBkYear; rankMonth = currentBkMonth; }
        else { rankYear = currentBkYear; }
        renderExpenseRanking();
        haptic();
      });
    });
    let prevBtn = document.getElementById('rankPrevBtn');
    let nextBtn = document.getElementById('rankNextBtn');
    if(prevBtn) prevBtn.onclick = () => {
      if(rankMode === 'month') {
        let newMonth = rankMonth - 1, newYear = rankYear;
        if(newMonth < 0) { newMonth = 11; newYear--; }
        rankYear = newYear; rankMonth = newMonth;
      } else { rankYear--; }
      renderExpenseRanking(); haptic();
    };
    if(nextBtn) nextBtn.onclick = () => {
      if(rankMode === 'month') {
        let newMonth = rankMonth + 1, newYear = rankYear;
        if(newMonth > 11) { newMonth = 0; newYear++; }
        rankYear = newYear; rankMonth = newMonth;
      } else { rankYear++; }
      renderExpenseRanking(); haptic();
    };
  }

  function renderWorkStatsAndChart(){

  function renderWorkCalendar(){
    const y=workDisplayYear, m=workDisplayMonth;
    const first = getFirstDayIndex(y,m), dim = getDaysInMonth(y,m);
    let cells = [];
    for(let i=1; i<first; i++) cells.push(`<div class="day-cell empty"><div class="day-number"></div></div>`);

    document.getElementById('calendarGrid').innerHTML = cells.join('');
    document.querySelectorAll('#calendarGrid .day-cell:not(.empty)').forEach(cell=>{ cell.addEventListener('click',()=>{ const dateKey = cell.dataset.date; if(dateKey){ document.querySelectorAll('#calendarGrid .day-cell').forEach(c=>c.classList.remove('selected')); cell.classList.add('selected'); currentSelectedWorkDate = dateKey; document.getElementById('selectedDateDisplay').innerHTML = `📅 已选中日期：${dateKey}`; haptic(); } }); });
    renderWorkStatsAndChart(); updateWorkSummaryCard();

  function buildWorkCell(y,m,d){

    else bottom = `<div class="empty-indicator">✨</div>`;
    return `<div class="${cls}" data-date="${key}"><div class="day-number">${d}</div>${bottom}</div>`;

  // ------------- 女生日历模块 -------------
  function getPeriodStartDates(){
    const starts = [];
    const periodDates = Object.keys(menstrualData).filter(k=>menstrualData[k]?.isPeriod).sort();
    if(periodDates.length === 0) return starts;
    let currentStart = periodDates[0];
    for(let i=1;i<periodDates.length;i++){
      const prev = new Date(periodDates[i-1]);
      const curr = new Date(periodDates[i]);
      const diff = (curr - prev) / 86400000;
      if(diff > periodDays+2){ starts.push(currentStart); currentStart = periodDates[i]; }
    }
    starts.push(currentStart);
    return starts;
  }
  function getAverageCycle(){
    const starts = getPeriodStartDates();
    if(starts.length < 2) return cycleLength;
    const intervals = [];
    for(let i=1;i<starts.length;i++){
      const prev = new Date(starts[i-1]);
      const cur = new Date(starts[i]);
      intervals.push((cur - prev) / 86400000);
    }
    const lastThree = intervals.slice(-3);
    if(lastThree.length === 0) return cycleLength;
    const sum = lastThree.reduce((a,b)=>a+b,0);
    return Math.round(sum / lastThree.length);
  }
  function getNextPeriodStart(){
    const starts = getPeriodStartDates();
    if(starts.length === 0) return null;
    const lastStart = starts[starts.length-1];
    const avgCycle = getAverageCycle();
    const next = new Date(lastStart);
    next.setDate(next.getDate() + avgCycle);
    return formatDateKey(next.getFullYear(), next.getMonth(), next.getDate());
  }
  function getOvulationWindowSet(){
    const nextStart = getNextPeriodStart();
    if(!nextStart) return new Set();
    const nextDate = new Date(nextStart);
    const ovulationDay = new Date(nextDate);
    ovulationDay.setDate(nextDate.getDate() - 14);
    const set = new Set();
    for(let i=-2;i<=2;i++){
      let day = new Date(ovulationDay);
      day.setDate(ovulationDay.getDate() + i);
      set.add(formatDateKey(day.getFullYear(), day.getMonth(), day.getDate()));
    }
    return set;
  }
  function getPredictionRange(){
    const nextStart = getNextPeriodStart();
    if(!nextStart) return new Set();
    const startDate = new Date(nextStart);
    const set = new Set();
    for(let i=-3;i<=2;i++){
      let day = new Date(startDate);
      day.setDate(startDate.getDate() + i);
      set.add(formatDateKey(day.getFullYear(), day.getMonth(), day.getDate()));
    }
    return set;
  }
  function setPeriodRange(startDateStr){
    const start = new Date(startDateStr);

      const cur = new Date(start);
      cur.setDate(start.getDate() + i);
      const key = formatDateKey(cur.getFullYear(), cur.getMonth(), cur.getDate());
      if(!menstrualData[key]) menstrualData[key] = { isPeriod: false, symptoms: [] };
      menstrualData[key].isPeriod = true;
    }
  }

  function buildGirlPeriodCell(y,m,d, ovuSet, predictSet){

  function getLunarYearInfo(year){ return lunarInfo[year-1900]; }
  function getLunarMonthDays(year, month){ let bit = 0x10000 >> month; return (getLunarYearInfo(year) & bit) ? 30 : 29; }
  function getLunarLeapMonth(year){ return getLunarYearInfo(year) & 0xf; }
  function solarToLunar(y,m,d){
    let baseDate = new Date(1900,0,31); let target = new Date(y,m-1,d); let offset = Math.floor((target - baseDate)/86400000);
    let year = 1900, month, day, isLeap=false;
    while(offset>0){
      let daysOfYear = 0;
      for(let i=1;i<=12;i++){ let days = getLunarMonthDays(year,i); if(i===getLunarLeapMonth(year)) days = getLunarMonthDays(year,i+1); daysOfYear += days; }
      if(offset>=daysOfYear){ offset-=daysOfYear; year++; continue; }
      let leap = getLunarLeapMonth(year);
      for(let i=1;i<=12;i++){ let days = getLunarMonthDays(year,i); if(i===leap){ let leapDays = getLunarMonthDays(year,i+1); if(offset<leapDays){ month=i; day=offset+1; isLeap=true; break; } offset-=leapDays; } if(offset<days){ month=i; day=offset+1; isLeap=false; break; } offset-=days; }
      break;
    }
    return { year, month, day, isLeap };
  }

    girlDisplayMonth = newMonth;
    document.getElementById('girlYearSelect').value = girlDisplayYear;
    document.getElementById('girlMonthSelect').value = girlDisplayMonth+1;
    if(girlCurrentMode === 'period') renderGirlCalendarPeriod();
    else renderGirlCalendarImportant();
    if(girlCurrentMode === 'important') renderImportantList();
  }
  function renderGirlCalendar(){
    if(girlCurrentMode === 'period') renderGirlCalendarPeriod();
    else renderGirlCalendarImportant();
  }
  function initGirlCalendar(){
    const now = new Date(); const girlYear = document.getElementById('girlYearSelect'); for(let y=now.getFullYear()-5; y<=now.getFullYear()+5; y++) girlYear.add(new Option(y,y)); girlYear.value = girlDisplayYear;
    const girlMonth = document.getElementById('girlMonthSelect'); for(let m=1;m<=12;m++) girlMonth.add(new Option(m,m)); girlMonth.value = girlDisplayMonth+1;
    girlYear.addEventListener('change',()=>{ girlDisplayYear=parseInt(girlYear.value); renderGirlCalendar(); });
    girlMonth.addEventListener('change',()=>{ girlDisplayMonth=parseInt(girlMonth.value)-1; renderGirlCalendar(); });
    document.querySelectorAll('.girl-tab').forEach(tab=>tab.addEventListener('click',()=>{ document.querySelectorAll('.girl-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); girlCurrentMode = tab.dataset.girlmode; document.getElementById('girlPeriodPanel').style.display = girlCurrentMode==='period'?'block':'none'; document.getElementById('girlImportantPanel').style.display = girlCurrentMode==='important'?'block':'none'; renderGirlCalendar(); if(girlCurrentMode==='important') renderImportantList(); haptic(); }));
    document.getElementById('saveGirlMenstrualBtn').addEventListener('click',()=>{ cycleLength = parseInt(document.getElementById('girlCycleLength').value); periodDays = parseInt(document.getElementById('girlPeriodDays').value); saveAll(); renderGirlCalendarPeriod(); renderCycleStatsPanel(); alert('设置已保存'); });
    const toggleBtn = document.getElementById('toggleImportantFormBtn');
    const formContainer = document.getElementById('importantFormContainer');
    toggleBtn.addEventListener('click',()=>{ if(formContainer.classList.contains('show')){ formContainer.classList.remove('show'); toggleBtn.innerHTML = '➕ 添加重要节日'; } else { formContainer.classList.add('show'); toggleBtn.innerHTML = '− 收起表单'; } });
    document.getElementById('addGirlImportantBtn').addEventListener('click',()=>{ const title = document.getElementById('girlImpTitle').value.trim(); const date = document.getElementById('girlImpDate').value; if(title&&date){ importantDays.push({ id:Date.now(), title, date, repeat:document.getElementById('girlImpRepeat').checked }); saveAll(); renderImportantList(); renderGirlCalendarImportant(); } });
    document.getElementById('girlPrevMonthBtn').addEventListener('click',()=>changeGirlMonth(-1));
    document.getElementById('girlNextMonthBtn').addEventListener('click',()=>changeGirlMonth(1));
    document.getElementById('girlImportantPrevMonthBtn').addEventListener('click',()=>changeGirlMonth(-1));
    document.getElementById('girlImportantNextMonthBtn').addEventListener('click',()=>changeGirlMonth(1));
    renderGirlCalendar();
    renderCycleStatsPanel();
  }

  // ------------- 备忘录模块 -------------
  function renderNoteCards(){
    const filtered = notes.filter(n=> n.categoryId === currentNoteCategoryId);
    const container = document.getElementById('noteListCards');
    if(!filtered.length){ container.innerHTML = '<div style="padding:20px;text-align:center;">✨ 暂无笔记，点击“新建”添加</div>'; currentNoteId = null; return; }
    const grouped = {};
    filtered.forEach(n=>{ const year = new Date(n.updatedAt).getFullYear(); if(!grouped[year]) grouped[year] = []; grouped[year].push(n); });
    const years = Object.keys(grouped).sort((a,b)=>b-a);
    let html = '';
    years.forEach(year=>{
      const yearNotes = grouped[year];
      html += `<div class="note-year-group"><div class="note-year-header" data-year="${year}">📁 ${year}年 <span>▼</span></div><div class="note-year-notes" id="year-${year}" style="display:block;">`;
      yearNotes.forEach(n=>{
        const activeClass = currentNoteId===n.id ? 'active' : '';
        html += `<div class="note-card ${activeClass}" data-id="${n.id}"><div class="note-card-info"><div class="note-card-title">📄 ${escapeHtml(n.title)}</div><div class="note-card-date">${new Date(n.updatedAt).toLocaleDateString()}</div></div><button class="note-menu-btn" data-id="${n.id}">⋮</button><div class="note-menu" id="menu-${n.id}"><button class="edit-note" data-id="${n.id}">✏️ 编辑</button><button class="delete-note-card" data-id="${n.id}">🗑️ 删除</button></div></div>`;
      });
      html += `</div></div>`;
    });
    container.innerHTML = html;
    document.querySelectorAll('.note-year-header').forEach(h=>{ h.addEventListener('click',()=>{ const year = h.dataset.year; const contentDiv = document.getElementById(`year-${year}`); if(contentDiv.style.display === 'none'){ contentDiv.style.display = 'block'; h.querySelector('span').innerHTML = '▼'; } else { contentDiv.style.display = 'none'; h.querySelector('span').innerHTML = '▶'; } }); });
    document.querySelectorAll('.note-menu-btn').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id = btn.dataset.id; const menu = document.getElementById(`menu-${id}`); document.querySelectorAll('.note-menu').forEach(m=>{ if(m !== menu) m.style.display = 'none'; }); menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex'; }); });
    document.querySelectorAll('.edit-note').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id = parseInt(btn.dataset.id); currentNoteId = id; renderNoteCards(); loadNoteToEditor(); const menu = document.getElementById(`menu-${id}`); if(menu) menu.style.display = 'none'; haptic(); }); });
    document.querySelectorAll('.delete-note-card').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=parseInt(btn.dataset.id); notes = notes.filter(n=>n.id!==id); if(notes.length===0) currentNoteId=null; else if(currentNoteId===id) currentNoteId = notes[0]?.id || null; saveAll(); renderNoteCards(); if(currentNoteId) loadNoteToEditor(); else { document.getElementById('noteTitleInput').value=''; document.getElementById('noteEditor').innerHTML=''; } }); });
    document.querySelectorAll('.note-card').forEach(card=>{ card.addEventListener('click',(e)=>{ if(!e.target.closest('.note-menu-btn') && !e.target.closest('.note-menu')){ const id = parseInt(card.dataset.id); currentNoteId = id; renderNoteCards(); loadNoteToEditor(); haptic(); } }); });
    document.addEventListener('click', function closeMenu(e){ if(!e.target.closest('.note-menu-btn')){ document.querySelectorAll('.note-menu').forEach(m=>m.style.display='none'); } });
  }
  function loadNoteToEditor(){
    if(currentNoteId){ const note = notes.find(n=>n.id===currentNoteId); if(note){ document.getElementById('noteTitleInput').value = note.title; document.getElementById('noteEditor').innerHTML = note.content || ''; } else { currentNoteId = null; loadNoteToEditor(); } }
    else { document.getElementById('noteTitleInput').value = ''; document.getElementById('noteEditor').innerHTML = ''; }
  }
  function saveCurrentNote(){
    if(!currentNoteId){ newNote(); return; }
    const note = notes.find(n=>n.id===currentNoteId);
    if(note){
      note.title = document.getElementById('noteTitleInput').value.trim() || '无标题';
      note.content = document.getElementById('noteEditor').innerHTML;
      note.updatedAt = new Date().toISOString();
      saveAll();
      if(note.categoryId !== currentNoteCategoryId){
        currentNoteCategoryId = note.categoryId;
        renderNoteCategories();
      }
      renderNoteCards();
      loadNoteToEditor();
      haptic();
      alert('已保存');
    }
  }
  function newNote(){
    const newId = Date.now();
    notes.push({ id:newId, categoryId:currentNoteCategoryId, title:'新笔记', content:'', createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() });
    currentNoteId = newId;
    saveAll();
    renderNoteCards();
    loadNoteToEditor();
    haptic();
  }
  function renderNoteCategories(){
    const bar = document.getElementById('noteCategoriesBar');
    bar.innerHTML = noteCategories.map(cat => `<div class="note-cat ${currentNoteCategoryId===cat?'active':''}" data-cat="${cat}">${cat}</div>`).join('') + `<button class="add-cat-btn" id="addNoteCatBtn">➕ 分类</button>`;
    document.querySelectorAll('.note-cat').forEach(el=>el.addEventListener('click',()=>{ currentNoteCategoryId = el.dataset.cat; currentNoteId = null; renderNoteCategories(); renderNoteCards(); loadNoteToEditor(); haptic(); }));
    document.getElementById('addNoteCatBtn').onclick = ()=>{ let newCat = prompt('新分类'); if(newCat && !noteCategories.includes(newCat)){ noteCategories.push(newCat); saveAll(); renderNoteCategories(); } };
  }
  function bindNoteToolbar(){
    const ed = document.getElementById('noteEditor');
    document.querySelector('[data-cmd="bold"]')?.addEventListener('click',()=>{ document.execCommand('bold'); ed.focus(); });
    document.getElementById('unorderedListBtn')?.addEventListener('click',()=>{ ed.focus(); document.execCommand('insertUnorderedList'); });
    document.getElementById('orderedListBtn')?.addEventListener('click',()=>{ ed.focus(); document.execCommand('insertOrderedList'); });
    document.getElementById('clearFormatBtn')?.addEventListener('click',()=>{ document.execCommand('removeFormat'); ed.focus(); });
    document.getElementById('textColorBtn')?.addEventListener('click',()=>{ let color=prompt('颜色代码(#RRGGBB)','#ff0000'); if(color) document.execCommand('foreColor',false,color); ed.focus(); });
    document.getElementById('bgColorBtn')?.addEventListener('click',()=>{ let color=prompt('背景色','#ffff00'); if(color) document.execCommand('backColor',false,color); ed.focus(); });
    document.getElementById('insertIconBtn')?.addEventListener('click',()=>{ let char=prompt('输入表情或特殊符号','😊'); if(char){ ed.focus(); document.execCommand('insertText',false,char); } });
    document.getElementById('insertImageBtn')?.addEventListener('click',()=>{ let url=prompt('图片URL'); if(url){ let img=`<img src="${url}" style="max-width:100%;">`; ed.focus(); document.execCommand('insertHTML',false,img); } });
  }
  function renderTodoCategories(){
    const container=document.getElementById('todoCategoriesContainer');
    container.innerHTML = todoCategories.map(cat => `<div class="cat-tab ${currentTodoCat===cat?'active':''}" data-cat="${cat}">${cat}</div>`).join('') + '<button id="addTodoCategoryBtn" class="add-cat-btn">➕ 分类</button>';
    document.querySelectorAll('.cat-tab').forEach(el=>el.addEventListener('click',()=>{ currentTodoCat=el.dataset.cat; renderTodoCategories(); renderTodoItems(); haptic(); }));
    document.getElementById('addTodoCategoryBtn').onclick=()=>{ let newCat=prompt('新分类'); if(newCat&&!todoCategories.includes(newCat)){ todoCategories.push(newCat); saveAll(); renderTodoCategories(); } };
  }
  function renderTodoItems(){
    const filtered=todos.filter(t=>t.category===currentTodoCat);
    const container=document.getElementById('todoItemsContainer');
    if(!filtered.length){ container.innerHTML='<div>✨ 暂无待办</div>'; return; }
    container.innerHTML=filtered.map(todo=>`<div class="todo-item" data-id="${todo.id}"><input type="checkbox" ${todo.completed?'checked':''}><input type="text" class="todo-text ${todo.completed?'completed':''}" value="${escapeHtml(todo.text)}"><button class="delete-todo">🗑️</button></div>`).join('');
    container.querySelectorAll('.todo-item').forEach(item=>{ const id=parseInt(item.dataset.id); const chk=item.querySelector('input[type="checkbox"]'); const txt=item.querySelector('.todo-text'); const del=item.querySelector('.delete-todo'); chk.addEventListener('change',()=>{ const todo=todos.find(t=>t.id===id); if(todo){ todo.completed=chk.checked; if(todo.completed) txt.classList.add('completed'); else txt.classList.remove('completed'); saveAll(); } }); txt.addEventListener('blur',()=>{ const todo=todos.find(t=>t.id===id); if(todo) todo.text=txt.value; saveAll(); }); del.addEventListener('click',()=>{ todos=todos.filter(t=>t.id!==id); saveAll(); renderTodoItems(); }); });
  }
  function addNewTodo(){
    const text=document.getElementById('newTodoText').value.trim();
    if(text){ todos.push({ id:Date.now(), text, completed:false, category:currentTodoCat }); saveAll(); renderTodoItems(); document.getElementById('newTodoText').value=''; haptic(); }
  }

  // ------------- 其他功能 -------------
  function showLock(callback){ if(!passwordEnabled||isUnlocked){ if(callback) callback(); return; }
    const div=document.createElement('div'); div.className='lock-overlay'; let temp='';
    div.innerHTML=`<div style="background:#fff0df; border-radius:48px; padding:24px;"><h3>🔐 请输入6位密码</h3><div style="font-size:2rem; letter-spacing:8px;" id="lockInput">______</div><div id="lockNumpad"></div><div><button id="lockOkBtn">确认</button><button id="lockCancelBtn">取消</button></div></div>`;
    document.body.appendChild(div);
    const inputSpan=div.querySelector('#lockInput'); const numpad=div.querySelector('#lockNumpad');
    for(let i=1;i<=9;i++){ let b=document.createElement('button'); b.textContent=i; b.onclick=()=>{ if(temp.length<6){ temp+=i; inputSpan.textContent=temp.padEnd(6,'_'); } }; numpad.appendChild(b); }
    let b0=document.createElement('button'); b0.textContent='0'; b0.onclick=()=>{ if(temp.length<6){ temp+='0'; inputSpan.textContent=temp.padEnd(6,'_'); } }; numpad.appendChild(b0);
    let delBtn=document.createElement('button'); delBtn.textContent='⌫'; delBtn.onclick=()=>{ temp=temp.slice(0,-1); inputSpan.textContent=temp.padEnd(6,'_'); }; numpad.appendChild(delBtn);
    div.querySelector('#lockOkBtn').onclick=()=>{ if(temp===savedPassword){ isUnlocked=true; document.body.removeChild(div); if(callback) callback(); } else { alert('密码错误'); temp=''; inputSpan.textContent='______'; } };
    div.querySelector('#lockCancelBtn').onclick=()=>{ document.body.removeChild(div); };
  }
  function setTheme(theme){ document.body.classList.remove('theme-mint','theme-sky'); if(theme==='mint') document.body.classList.add('theme-mint'); else if(theme==='sky') document.body.classList.add('theme-sky'); localStorage.setItem(THEME_KEY,theme); }
  function confirmClearAllData() { if(confirm('⚠️ 清空所有数据不可恢复，确定吗？')){ localStorage.clear(); location.reload(); } }
  function switchView(view){
    if(passwordEnabled && !isUnlocked && view!=='settings'){ showLock(()=>switchView(view)); return; }
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById(view+'View').classList.add('active');
    document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.view===view));
    if(view==='calendar') renderWorkCalendar();
    if(view==='girlCalendar'){ renderGirlCalendar(); if(girlCurrentMode==='important') renderImportantList(); }
    if(view==='bookkeeping') refreshBookkeepingUI();
    haptic();
  }
  function updatePasswordLockStatus(){ const span=document.getElementById('passwordLockStatus'); if(span) span.textContent=passwordEnabled?'已开启':'未开启'; }

  function initAll(){
    loadAll(); updatePasswordLockStatus();
    setDefaultDateInput();
    document.getElementById('themeDefaultBtn').onclick=()=>setTheme('default');
    document.getElementById('themeMintBtn').onclick=()=>setTheme('mint');
    document.getElementById('themeSkyBtn').onclick=()=>setTheme('sky');
    const startYear = 2020, endYear = 2100;
    const yearOptions = () => { let s=''; for(let y=startYear; y<=endYear; y++) s+=`<option value="${y}">${y}</option>`; return s; };
    document.getElementById('workYearSelect').innerHTML = yearOptions();
    document.getElementById('workYearlyYearSelect').innerHTML = yearOptions();
    document.getElementById('bkYearlyYearSelect').innerHTML = yearOptions();
    document.getElementById('bkYearStartSelect').innerHTML = yearOptions();
    document.getElementById('bkYearEndSelect').innerHTML = yearOptions();
    document.getElementById('workYearStartSelect').innerHTML = yearOptions();
    document.getElementById('workYearEndSelect').innerHTML = yearOptions();
    document.getElementById('workYearSelect').value = workDisplayYear;
    document.getElementById('workYearlyYearSelect').value = currentYear;
    document.getElementById('bkYearlyYearSelect').value = currentYear;
    document.getElementById('bkYearStartSelect').value = startYear;
    document.getElementById('bkYearEndSelect').value = currentYear;
    document.getElementById('workYearStartSelect').value = startYear;
    document.getElementById('workYearEndSelect').value = currentYear;
    for(let m=1;m<=12;m++) document.getElementById('workMonthSelect').add(new Option(m,m));
    document.getElementById('workMonthSelect').value = workDisplayMonth+1;
    document.getElementById('workYearSelect').onchange = ()=>{ workDisplayYear = parseInt(document.getElementById('workYearSelect').value); renderWorkCalendar(); };
    document.getElementById('workMonthSelect').onchange = ()=>{ workDisplayMonth = parseInt(document.getElementById('workMonthSelect').value)-1; renderWorkCalendar(); };
    document.getElementById('workYearlyYearSelect').onchange = renderWorkYearlySummary;
    document.getElementById('bkYearlyYearSelect').onchange = renderBkYearlySummary;
    document.getElementById('bkYearStartSelect').onchange = renderBkYearlySummary;
    document.getElementById('bkYearEndSelect').onchange = renderBkYearlySummary;
    document.getElementById('workYearStartSelect').onchange = renderWorkYearlySummary;
    document.getElementById('workYearEndSelect').onchange = renderWorkYearlySummary;
    document.getElementById('workYearlyHeader').addEventListener('click', ()=>document.getElementById('workYearlyContent').classList.toggle('show'));
    document.getElementById('bkYearlyHeader').addEventListener('click', ()=>document.getElementById('bkYearlyContent').classList.toggle('show'));
    document.getElementById('collapseHeader').addEventListener('click', ()=>document.getElementById('collapseContent').classList.toggle('show'));
    document.getElementById('pieChartHeader').addEventListener('click', ()=>document.getElementById('pieChartContent').classList.toggle('show'));
    const bkSwitchBtns = document.querySelectorAll('#bkChartSwitch .switch-btn');
    bkSwitchBtns.forEach(btn=>{ btn.addEventListener('click',()=>{ bkSwitchBtns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); bkChartMode = btn.dataset.mode; const picker = document.getElementById('bkYearPickerContainer'), range = document.getElementById('bkYearRangeContainer'); if(bkChartMode === 'year'){ picker.style.display='none'; range.style.display='flex'; } else { picker.style.display='flex'; range.style.display='none'; } renderBkYearlySummary(); }); });
    const workSwitchBtns = document.querySelectorAll('#workChartSwitch .switch-btn');
    workSwitchBtns.forEach(btn=>{ btn.addEventListener('click',()=>{ workSwitchBtns.forEach(b=>b.classList.remove('active')); btn.classList.add('active'); workChartMode = btn.dataset.mode; const picker = document.getElementById('workYearPickerContainer'), range = document.getElementById('workYearRangeContainer'); if(workChartMode === 'year'){ picker.style.display='none'; range.style.display='flex'; } else { picker.style.display='flex'; range.style.display='none'; } renderWorkYearlySummary(); }); });
    renderCategoryList(); renderCategorySelect(); renderWorkCalendar();
    renderWorkYearlySummary(); renderBkYearlySummary();
    if(bkChartMode === 'year'){ document.getElementById('bkYearPickerContainer').style.display='none'; document.getElementById('bkYearRangeContainer').style.display='flex'; }
    if(workChartMode === 'year'){ document.getElementById('workYearPickerContainer').style.display='none'; document.getElementById('workYearRangeContainer').style.display='flex'; }
    document.getElementById('addWorkRecordBtn').onclick = addWorkRecordFromForm;
    document.getElementById('addCategoryBtn').onclick = addNewCategory;
    document.getElementById('closeModalBtn').onclick = closeModal;
    document.getElementById('dayModal').onclick = e=>{ if(e.target===document.getElementById('dayModal')) closeModal(); };
    document.getElementById('prevMonthBk').onclick=()=>changeBkMonth(-1);
    document.getElementById('nextMonthBk').onclick=()=>changeBkMonth(1);
    document.getElementById('addBkBtn').onclick=addBookkeeping;
    document.getElementById('manageRecordsBtn').onclick=showRecordModal;
    document.getElementById('closeRecordModalBtn').onclick = ()=>document.getElementById('recordModal').classList.remove('show');
    document.getElementById('manageWorkRecordsBtn').onclick = showWorkRecordsModal;
    document.getElementById('closeWorkModalBtn').onclick = ()=>document.getElementById('workRecordsModal').classList.remove('show');
    document.querySelectorAll('#bkTypeToggle .type-btn').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('#bkTypeToggle .type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentBkType=btn.dataset.type; renderBkCategoryGrid(); }));
    renderBkCategoryGrid(); refreshBookkeepingUI();
    renderExpenseRanking();
    renderNoteCategories(); renderNoteCards(); loadNoteToEditor();
    document.getElementById('newNoteBtn').onclick=newNote;
    document.getElementById('saveNoteBtn').onclick=saveCurrentNote;
    renderTodoCategories(); renderTodoItems();
    document.getElementById('addTodoBtn').onclick=addNewTodo;
    bindNoteToolbar();
    document.querySelectorAll('.note-tab').forEach(btn=>{ btn.addEventListener('click',()=>{ const tab=btn.dataset.tab; document.querySelectorAll('.note-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); document.getElementById('notePanel').classList.toggle('active',tab==='note'); document.getElementById('todoPanel').classList.toggle('active',tab==='todo'); if(tab==='note') renderNoteCategories(); else renderTodoCategories(); }); });
    initGirlCalendar();
    document.querySelectorAll('.nav-item').forEach(item=>item.addEventListener('click',()=>switchView(item.dataset.view)));
    document.getElementById('exportDataBtn').onclick=()=>{ const data={records,workCategories,bkRecords,notes:{categories:noteCategories,notes},todoCategories,todos,menstrualData,cycleLength,periodDays,importantDays}; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'})); a.download=`backup_${Date.now()}.json`; a.click(); };
    document.getElementById('importDataBtn').onclick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=e=>{ const f=e.target.files[0]; const reader=new FileReader(); reader.onload=ev=>{ const d=JSON.parse(ev.target.result); if(d.records) records=d.records; if(d.workCategories) workCategories=d.workCategories; if(d.bkRecords) bkRecords=d.bkRecords; if(d.notes){ noteCategories=d.notes.categories||noteCategories; notes=d.notes.notes||notes; } if(d.todoCategories) todoCategories=d.todoCategories; if(d.todos) todos=d.todos; if(d.menstrualData) menstrualData=d.menstrualData; if(d.cycleLength) cycleLength=d.cycleLength; if(d.periodDays) periodDays=d.periodDays; if(d.importantDays) importantDays=d.importantDays; saveAll(); renderWorkCalendar(); refreshBookkeepingUI(); renderWorkYearlySummary(); renderBkYearlySummary(); renderNoteCategories(); renderNoteCards(); loadNoteToEditor(); renderTodoCategories(); renderTodoItems(); renderGirlCalendar(); renderCycleStatsPanel(); renderExpenseRanking(); alert('导入成功'); }; reader.readAsText(f); }; inp.click(); };
    document.getElementById('clearAllDataBtn').onclick=confirmClearAllData;
    document.getElementById('togglePasswordLockBtn').onclick=()=>{ let pwd=prompt('设置6位数字密码'); if(pwd&&/^\d{6}$/.test(pwd)){ savedPassword=pwd; passwordEnabled=true; saveAll(); isUnlocked=false; updatePasswordLockStatus(); alert('密码已启用'); showLock(); } else alert('密码必须为6位数字'); };
    document.getElementById('disablePasswordLockBtn').onclick=()=>{ passwordEnabled=false; saveAll(); isUnlocked=true; updatePasswordLockStatus(); alert('密码锁已关闭'); };
    if(passwordEnabled && !isUnlocked) showLock();
  }
  initAll();
})();
</script>
</body>

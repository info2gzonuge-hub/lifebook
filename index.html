  <!-- 动态生成真实图标并注入 manifest -->
  <script>
    function generateAppIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#ffd9e8');
      gradient.addColorStop(1, '#ffa6c9');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2.2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#b3415c';
      ctx.font = `bold ${size*0.5}px "Segoe UI", sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🌈', size/2, size/2);
      return canvas.toDataURL('image/png');
    }

    const icon180 = generateAppIcon(180);
    const icon512 = generateAppIcon(512);

    const manifest = {
      name: '全能生活本',
      short_name: '全能本',
      start_url: '.',
      display: 'standalone',
      theme_color: '#ffd9e8',
      background_color: '#ffe0ec',
      icons: [
        { src: icon180, sizes: '180x180', type: 'image/png' },
        { src: icon512, sizes: '512x512', type: 'image/png' }
      ]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = manifestURL;
    document.head.appendChild(link);

    const appleIcon = document.createElement('link');
    appleIcon.rel = 'apple-touch-icon';
    appleIcon.href = icon180;
    document.head.appendChild(appleIcon);
  </script>

    if ('serviceWorker' in navigator) {

        navigator.serviceWorker.register('./sw.js').then(reg => {
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                if (confirm('有新版本可用，是否立即刷新？')) {
                  newWorker.postMessage('skipWaiting');
                  window.location.reload();
                }
              }
            });
          });
        });
      });
    }
  </script>

<body>

  <!-- 备忘录视图 -->

<!-- 工时记录编辑弹窗 -->
<div class="modal-overlay" id="dayModal"><div class="modal-sheet"><div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:12px;"><span id="modalDateTitle" style="font-weight:800;"></span><button class="close-icon" id="closeModalBtn" style="background:none; font-size:1.5rem;">✕</button></div><div id="recordsListContainer"></div><div id="editFormContainer"></div></div></div>

<script>
  (function(){
    // 存储KEY
    const STORAGE_KEY = 'dopa_work_v17';
    const BK_STORAGE_KEY = 'dopa_bookkeeping_v8';
    const NOTE_STORAGE_KEY = 'dopa_note_v5';
    const TODO_STORAGE_KEY = 'dopa_todo_v2';
    const PASSWORD_KEY = 'dopa_password';
    const PASSWORD_ENABLED_KEY = 'dopa_password_enabled';
    const PERIOD_STORAGE_KEY = 'dopa_period_v1';
    const IMPORTANT_STORAGE_KEY = 'dopa_important_v1';
    const THEME_KEY = 'dopa_theme';
    const REMINDER_ENABLED_KEY = 'dopa_reminder_enabled';
    const WORK_CATEGORIES_KEY = 'work_categories_v1';

    let workCategories = [];
    let records = {};
    let bkRecords = [];
    let todoCategories = ['工作','生活','学习','购物'];
    let todos = [];
    let menstrualData = {};
    let importantDays = [];
    let cycleLength = 28, periodDays = 7, reminderEnabled = false;
    let noteCategories = ['个人', '工作', '灵感'];
    let notes = [];
    let currentNoteId = null, currentNoteCategoryId = '个人', currentTodoCat = '工作';

    let currentYear = new Date().getFullYear(), currentMonth = new Date().getMonth();
    let selectedDateStr = '', editingRecordId = null;
    let passwordEnabled = false, savedPassword = '', isUnlocked = true;
    let currentBkYear = new Date().getFullYear(), currentBkMonth = new Date().getMonth(), currentBkType = 'expense', currentBkCategory = '';
    let workDisplayYear = currentYear, workDisplayMonth = currentMonth;
    let girlDisplayYear = currentYear, girlDisplayMonth = currentMonth, girlCurrentMode = 'period';
    let expenseChart, incomeChart, categoryChart;
    let currentSelectedWorkDate = null;

    function haptic() {
      if (window.navigator && window.navigator.vibrate) {
        window.navigator.vibrate(10);
      }
    }

    function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':m==='<'?'&lt;':'>'); }
    function formatDateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
    function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
    function getFirstDayIndex(y,m){ let d=new Date(y,m,1).getDay(); return d===0?7:d; }
    function getDaySummary(key){ let h=0,inc=0; (records[key]||[]).forEach(r=>{ h+=r.hours||0; inc+=r.income||0; }); return {hours:h,income:inc}; }
    function saveToLocal(key,data){ localStorage.setItem(key, JSON.stringify(data)); }
    function loadFromLocal(key,def){ const s=localStorage.getItem(key); return s?JSON.parse(s):def; }

    function loadAll(){
      workCategories = loadFromLocal(WORK_CATEGORIES_KEY, []);
      if(workCategories.length === 0){
        workCategories = [
          { id: 'cat1', name: '达美乐', hourlyRate: 19 },
          { id: 'cat2', name: '美团', hourlyRate: 19 }
        ];
      }
      records = loadFromLocal(STORAGE_KEY, {});
      bkRecords = loadFromLocal(BK_STORAGE_KEY, []);
      const rawNote = loadFromLocal(NOTE_STORAGE_KEY, null);
      if(rawNote && rawNote.categories && Array.isArray(rawNote.notes)){
        noteCategories = rawNote.categories;
        notes = rawNote.notes;
      } else {
        notes = [];
        saveToLocal(NOTE_STORAGE_KEY, { categories: noteCategories, notes });
      }
      currentNoteId = notes.length > 0 ? notes[0].id : null;
      currentNoteCategoryId = noteCategories[0];
      const todoData = loadFromLocal(TODO_STORAGE_KEY, { categories: ['工作','生活','学习','购物'], todos: [] });
      todoCategories = todoData.categories;
      todos = todoData.todos;
      const periodData = loadFromLocal(PERIOD_STORAGE_KEY, { menstrualData: {}, cycleLength: 28, periodDays: 7 });
      menstrualData = periodData.menstrualData;
      cycleLength = periodData.cycleLength;
      periodDays = periodData.periodDays;
      importantDays = loadFromLocal(IMPORTANT_STORAGE_KEY, []);
      passwordEnabled = localStorage.getItem(PASSWORD_ENABLED_KEY)==='true';
      savedPassword = localStorage.getItem(PASSWORD_KEY)||'';
      isUnlocked = !passwordEnabled;
      reminderEnabled = localStorage.getItem(REMINDER_ENABLED_KEY) === 'true';
      currentTodoCat = todoCategories[0] || '工作';
      const savedTheme = localStorage.getItem(THEME_KEY) || 'default';
      document.body.classList.remove('theme-mint', 'theme-sky');
      if(savedTheme === 'mint') document.body.classList.add('theme-mint');
      else if(savedTheme === 'sky') document.body.classList.add('theme-sky');
    }
    function saveAll(){
      saveToLocal(WORK_CATEGORIES_KEY, workCategories);
      saveToLocal(STORAGE_KEY, records);
      saveToLocal(BK_STORAGE_KEY, bkRecords);
      saveToLocal(NOTE_STORAGE_KEY, { categories: noteCategories, notes });
      saveToLocal(TODO_STORAGE_KEY, { categories: todoCategories, todos });
      saveToLocal(PERIOD_STORAGE_KEY, { menstrualData, cycleLength, periodDays });
      saveToLocal(IMPORTANT_STORAGE_KEY, importantDays);
      localStorage.setItem(PASSWORD_ENABLED_KEY, passwordEnabled);
      localStorage.setItem(PASSWORD_KEY, savedPassword);
      localStorage.setItem(REMINDER_ENABLED_KEY, reminderEnabled);
    }

    function updatePasswordLockStatus() {
      const statusSpan = document.getElementById('passwordLockStatus');
      if(statusSpan) statusSpan.textContent = passwordEnabled ? '已开启' : '未开启';
    }

    // ========== 记账模块 ==========
    const expenseCategories = ['餐饮','日用','交通','通讯','购物','娱乐','医疗','其他'];
    const incomeCategories = ['工资','兼职','红包','理财','奖金','其他'];
    function renderBkCategoryGrid(){
      const cats = currentBkType==='expense'?expenseCategories:incomeCategories;
      document.getElementById('bkCategoryGrid').innerHTML = cats.map(cat => `<div class="cat-icon ${currentBkCategory===cat?'active':''}" data-category="${cat}">${cat}</div>`).join('');
      document.querySelectorAll('#bkCategoryGrid .cat-icon').forEach(el=>el.addEventListener('click',()=>{
        document.querySelectorAll('#bkCategoryGrid .cat-icon').forEach(c=>c.classList.remove('active'));
        el.classList.add('active');
        currentBkCategory = el.dataset.category;
        haptic();
      }));
      if(!currentBkCategory && cats.length) currentBkCategory = cats[0];
      const first = document.querySelector('#bkCategoryGrid .cat-icon');
      if(first) first.classList.add('active');
    }
    function refreshBookkeepingUI(){
      const recs = bkRecords.filter(r=>{let d=new Date(r.date); return d.getFullYear()===currentBkYear && d.getMonth()===currentBkMonth;});
      let inc=0,exp=0,incMap=new Map(),expMap=new Map();
      recs.forEach(r=>{
        if(r.type==='income'){ inc+=r.amount; incMap.set(r.category,(incMap.get(r.category)||0)+r.amount); }
        else { exp+=r.amount; expMap.set(r.category,(expMap.get(r.category)||0)+r.amount); }
      });
      document.getElementById('monthIncomeBk').innerText=inc.toFixed(2);
      document.getElementById('monthExpenseBk').innerText=exp.toFixed(2);
      document.getElementById('monthBalanceBk').innerText=(inc-exp).toFixed(2);
      if(expenseChart) expenseChart.destroy();
      if(incomeChart) incomeChart.destroy();
      const totalExp = exp;
      expenseChart = new Chart(document.getElementById('expensePieChart'),{
        type:'pie',
        data:{ labels:Array.from(expMap.keys()), datasets:[{ data:Array.from(expMap.values()), backgroundColor:['#FFB3BA','#C5E99B','#B5E3FF','#FFD6A5','#D4B8D4','#A7E0E0','#FBC8B5','#C9C9C9'] }] },
        options:{
          plugins:{ legend:{ display: false }, tooltip:{ callbacks:{ label: (ctx) => { const label = ctx.label || ''; const value = ctx.raw; const percent = totalExp > 0 ? ((value / totalExp) * 100).toFixed(1) : 0; return `${label}: ¥${value.toFixed(2)} (${percent}%)`; } } } },
          onClick:(e,active)=>{ if(active.length){ const idx=active[0].index; const label=expenseChart.data.labels[idx]; const val=expenseChart.data.datasets[0].data[idx]; const percent = totalExp>0 ? ((val/totalExp)*100).toFixed(1) : 0; alert(`${label}：¥${val.toFixed(2)}，占总支出的 ${percent}%`); } }
        }
      });
      const totalInc = inc;

    function getLunarYearInfo(year){ return lunarInfo[year-1900]; }
    function getLunarMonthDays(year, month){ let bit = 0x10000 >> month; return (getLunarYearInfo(year) & bit) ? 30 : 29; }
    function getLunarLeapMonth(year){ return getLunarYearInfo(year) & 0xf; }
    function solarToLunar(y,m,d){
      let baseDate = new Date(1900,0,31);
      let target = new Date(y,m-1,d);
      let offset = Math.floor((target - baseDate)/86400000);
      let year = 1900, month, day, isLeap=false;
      while(offset>0){
        let daysOfYear = 0;
        for(let i=1;i<=12;i++){
          let days = getLunarMonthDays(year,i);
          if(i===getLunarLeapMonth(year)) days = getLunarMonthDays(year,i+1);
          daysOfYear += days;
        }
        if(offset>=daysOfYear){ offset-=daysOfYear; year++; continue; }
        let leap = getLunarLeapMonth(year);
        for(let i=1;i<=12;i++){
          let days = getLunarMonthDays(year,i);
          if(i===leap){ 
            let leapDays = getLunarMonthDays(year,i+1);
            if(offset<leapDays){ month=i; day=offset+1; isLeap=true; break; }
            offset-=leapDays;
          }
          if(offset<days){ month=i; day=offset+1; isLeap=false; break; }
          offset-=days;
        }
        break;
      }
      return { year, month, day, isLeap };
    }
    function getShortLunarDayString(y,m,d){
      const lunar = solarToLunar(y,m,d);
      const arr = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
      return arr[lunar.day-1] || '三十';
    }

    function getFestival(y,m,d){
      const mmdd = `${String(m).padStart(2,'0')}${String(d).padStart(2,'0')}`;
      if(festivals[mmdd]) return festivals[mmdd];
      const lunar = solarToLunar(y,m,d);
      const key = `lunar-${String(lunar.month).padStart(2,'0')}${String(lunar.day).padStart(2,'0')}`;
      return festivals[key] || null;
    }
    function getLunarOrFestivalShort(y,m,d){
      const fest = getFestival(y,m,d);
      if(fest) return fest;
      return getShortLunarDayString(y,m,d);

        if(isPeriod || symptoms.length) menstrualData[dateKey] = { isPeriod, symptoms };
        else delete menstrualData[dateKey];
        saveAll(); document.body.removeChild(modal); renderGirlCalendar(); checkPeriodReminder();
      };
      modal.querySelector('#cancelPeriodBtn').onclick=()=>document.body.removeChild(modal);
    }
    function onImportantClick(dateKey){
      const title = prompt('添加重要日子', '纪念日');
      if(title){ importantDays.push({ id:Date.now(), title, date:dateKey, repeat:false }); saveAll(); renderImportantList(); renderGirlCalendar(); }
    }
    function renderImportantList(){
      const container = document.getElementById('girlImportantList');
      if(!importantDays.length){ container.innerHTML='<div>暂无重要日子</div>'; return; }
      const today = new Date(); today.setHours(0,0,0,0);
      container.innerHTML = importantDays.map(imp=>{
        let target = new Date(imp.date);
        let diff = 0;
        if(imp.repeat){
          let curYear = today.getFullYear();
          let thisYear = new Date(curYear, target.getMonth(), target.getDate());
          if(thisYear < today) thisYear.setFullYear(curYear+1);
          diff = Math.ceil((thisYear - today)/86400000);
        } else diff = Math.ceil((target - today)/86400000);
        const prefix = diff>=0 ? '还有' : '已过';
        const absDiff = Math.abs(diff);
        return `<div class="important-item"><div class="important-info"><div class="important-title">📌 ${escapeHtml(imp.title)}</div><div class="important-date">${imp.date} ${imp.repeat?'🔄每年':''}</div></div><div class="important-actions"><button class="edit-imp" data-id="${imp.id}">✏️</button><button class="del-imp" data-id="${imp.id}">🗑️</button><div class="important-days"><div class="important-days-number">${absDiff}</div><div class="important-days-label">${prefix} ${absDiff===1?'天':'天'}</div></div></div></div>`;
      }).join('');
      document.querySelectorAll('.del-imp').forEach(btn=>btn.addEventListener('click',e=>{ let id=parseInt(btn.dataset.id); importantDays=importantDays.filter(d=>d.id!==id); saveAll(); renderImportantList(); renderGirlCalendar(); }));
      document.querySelectorAll('.edit-imp').forEach(btn=>btn.addEventListener('click',e=>{ let id=parseInt(btn.dataset.id); let imp=importantDays.find(d=>d.id===id); if(imp){ let newTitle=prompt('编辑标题',imp.title); if(newTitle) imp.title=newTitle; let newDate=prompt('日期(YYYY-MM-DD)',imp.date); if(newDate&&/^\d{4}-\d{2}-\d{2}$/.test(newDate)) imp.date=newDate; let newRepeat=confirm('每年重复？'); imp.repeat=newRepeat; saveAll(); renderImportantList(); renderGirlCalendar(); } }));
    }
    function checkPeriodReminder(){
      if(!reminderEnabled) return;
      const today = new Date(); today.setHours(0,0,0,0);
      const dates = Object.keys(menstrualData).filter(k=>menstrualData[k]?.isPeriod).sort();
      if(dates.length===0) return;
      let lastPeriodStart = new Date(dates[dates.length-1]);
      let nextPeriodStart = new Date(lastPeriodStart);
      nextPeriodStart.setDate(lastPeriodStart.getDate()+cycleLength);
      let diffDays = Math.ceil((nextPeriodStart - today)/86400000);
      if(diffDays===2) alert('🌸 温馨提示：预计2天后进入经期，请提前做好准备。');
    }
    function initGirlCalendar(){
      const now = new Date();
      for(let y=now.getFullYear()-5; y<=now.getFullYear()+5; y++) document.getElementById('girlYearSelect').add(new Option(y,y));
      document.getElementById('girlYearSelect').value = girlDisplayYear;
      for(let m=1;m<=12;m++) document.getElementById('girlMonthSelect').add(new Option(m,m));
      document.getElementById('girlMonthSelect').value = girlDisplayMonth+1;
      document.getElementById('girlYearSelect').addEventListener('change',()=>{ girlDisplayYear=parseInt(document.getElementById('girlYearSelect').value); renderGirlCalendar(); });
      document.getElementById('girlMonthSelect').addEventListener('change',()=>{ girlDisplayMonth=parseInt(document.getElementById('girlMonthSelect').value)-1; renderGirlCalendar(); });
      document.querySelectorAll('.girl-tab').forEach(tab=>tab.addEventListener('click',()=>{
        document.querySelectorAll('.girl-tab').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        girlCurrentMode = tab.dataset.girlmode;
        document.getElementById('girlPeriodPanel').style.display = girlCurrentMode==='period'?'block':'none';
        document.getElementById('girlImportantPanel').style.display = girlCurrentMode==='important'?'block':'none';
        renderGirlCalendar();
        if(girlCurrentMode==='important') renderImportantList();
        haptic();
      }));
      document.getElementById('saveGirlMenstrualBtn').addEventListener('click',()=>{
        cycleLength = parseInt(document.getElementById('girlCycleLength').value);
        periodDays = parseInt(document.getElementById('girlPeriodDays').value);
        reminderEnabled = document.getElementById('periodReminderCheckbox').checked;
        saveAll(); renderGirlCalendar(); checkPeriodReminder(); alert('设置已保存');
      });
      document.getElementById('addGirlImportantBtn').addEventListener('click',()=>{
        const title = document.getElementById('girlImpTitle').value.trim();
        const date = document.getElementById('girlImpDate').value;
        if(title&&date){ importantDays.push({ id:Date.now(), title, date, repeat:document.getElementById('girlImpRepeat').checked }); saveAll(); renderImportantList(); renderGirlCalendar(); }
      });
      renderGirlCalendar();
      document.getElementById('periodReminderCheckbox').checked = reminderEnabled;
    }

    // ========== 笔记模块 ==========
    function renderNoteCategories(){
      const bar = document.getElementById('noteCategoriesBar');
      bar.innerHTML = noteCategories.map(cat => `<div class="note-cat ${currentNoteCategoryId===cat?'active':''}" data-cat="${cat}">📁 ${cat}</div>`).join('') + `<button class="add-cat-btn" id="addNoteCatBtn">➕ 分类</button>`;
      document.querySelectorAll('.note-cat').forEach(el=>el.addEventListener('click',()=>{ currentNoteCategoryId=el.dataset.cat; renderNoteCategories(); renderNoteCards(); haptic(); }));
      document.getElementById('addNoteCatBtn').onclick=()=>{ let newCat=prompt('新分类'); if(newCat&&!noteCategories.includes(newCat)){ noteCategories.push(newCat); saveAll(); renderNoteCategories(); } };
    }
    function renderNoteCards(){
      const filtered = notes.filter(n=>n.categoryId===currentNoteCategoryId);
      const container = document.getElementById('noteListCards');
      if(!filtered.length){ container.innerHTML='<div style="padding:20px;text-align:center;">✨ 暂无笔记，点击“新建”添加</div>'; return; }
      container.innerHTML = filtered.map(n=>`<div class="note-card ${currentNoteId===n.id?'active':''}" data-id="${n.id}"><div class="note-card-info"><div class="note-card-title">📄 ${escapeHtml(n.title)}</div><div class="note-card-date">${new Date(n.updatedAt).toLocaleDateString()}</div></div><div class="note-card-actions"><button class="delete-note-card" data-id="${n.id}">🗑️</button></div></div>`).join('');
      document.querySelectorAll('.note-card').forEach(card=>card.addEventListener('click',(e)=>{ if(!e.target.classList.contains('delete-note-card')){ currentNoteId=parseInt(card.dataset.id); renderNoteCards(); loadNoteToEditor(); haptic(); } }));
      document.querySelectorAll('.delete-note-card').forEach(btn=>btn.addEventListener('click',(e)=>{ e.stopPropagation(); const id=parseInt(btn.dataset.id); notes=notes.filter(n=>n.id!==id); if(notes.length === 0){ currentNoteId = null; } else if(currentNoteId === id){ currentNoteId = notes[0]?.id || null; } saveAll(); renderNoteCards(); if(currentNoteId) loadNoteToEditor(); else { document.getElementById('noteTitleInput').value = ''; document.getElementById('noteEditor').innerHTML = ''; } }));
    }
    function loadNoteToEditor(){ const note=notes.find(n=>n.id===currentNoteId); if(note){ document.getElementById('noteTitleInput').value=note.title; document.getElementById('noteEditor').innerHTML=note.content||''; } }
    function saveCurrentNote(){ 
      if(!currentNoteId){
        newNote();
        return;
      }
      const note=notes.find(n=>n.id===currentNoteId);
      if(note){ 
        note.title=document.getElementById('noteTitleInput').value.trim()||'无标题'; 
        note.content=document.getElementById('noteEditor').innerHTML; 
        note.updatedAt=new Date().toISOString(); 
        saveAll(); 
        renderNoteCards(); 
        haptic();
        alert('已保存'); 
      } 
    }
    function newNote(){ 
      const newId=Date.now(); 
      notes.push({ id:newId, categoryId:currentNoteCategoryId, title:'新笔记', content:'', createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() }); 
      currentNoteId=newId; 
      saveAll(); 
      renderNoteCards(); 
      loadNoteToEditor(); 
      haptic();
    }
    function insertList(type){
      const editor=document.getElementById('noteEditor'); editor.focus();
      const sel=window.getSelection(); if(!sel.rangeCount) return;
      const range=sel.getRangeAt(0);
      const selectedText=range.toString();
      const tag=type==='ul'?'ul':'ol';
      const lines=selectedText.split(/\r?\n/).filter(l=>l.trim());
      let html=lines.length?`<${tag}>`+lines.map(l=>`<li>${escapeHtml(l)}</li>`).join('')+`</${tag}>`:`<${tag}><li></li></${tag}>`;
      range.deleteContents();
      const frag=range.createContextualFragment(html);
      range.insertNode(frag);
      range.collapse(false);
      sel.removeAllRanges(); sel.addRange(range);
    }
    function bindNoteToolbar(){
      const ed=document.getElementById('noteEditor');
      document.querySelector('[data-cmd="bold"]')?.addEventListener('click',()=>{ document.execCommand('bold'); ed.focus(); });
      document.getElementById('unorderedListBtn')?.addEventListener('click',()=>insertList('ul'));
      document.getElementById('orderedListBtn')?.addEventListener('click',()=>insertList('ol'));
      document.getElementById('clearFormatBtn')?.addEventListener('click',()=>{ document.execCommand('removeFormat'); ed.focus(); });
      document.getElementById('textColorBtn')?.addEventListener('click',(e)=>{ e.stopPropagation(); showColorPicker('foreColor'); });
      document.getElementById('bgColorBtn')?.addEventListener('click',(e)=>{ e.stopPropagation(); showColorPicker('backColor'); });
      const iconPicker=document.getElementById('iconPicker');
      const iconList=['😀','😂','😍','😭','😡','👍','❤️','⭐','🔥','💡','🔔','📌','✅','❌','⚠️','🎉','✨','💪'];
      document.getElementById('insertIconBtn')?.addEventListener('click',()=>{
        iconPicker.innerHTML=iconList.map(i=>`<span class="icon-option" style="font-size:1.6rem; cursor:pointer; padding:6px;">${i}</span>`).join('');
        iconPicker.style.display=iconPicker.style.display==='none'?'flex':'none';
        document.querySelectorAll('.icon-option').forEach(opt=>opt.addEventListener('click',()=>{ ed.focus(); document.execCommand('insertText',false,opt.textContent); iconPicker.style.display='none'; }));
      });
      document.getElementById('insertImageBtn')?.addEventListener('click',()=>{ let inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ let f=e.target.files[0]; if(f){ let reader=new FileReader(); reader.onload=ev=>{ let img=document.createElement('img'); img.src=ev.target.result; img.style.maxWidth='100%'; ed.focus(); document.execCommand('insertHTML',false,img.outerHTML); }; reader.readAsDataURL(f); } }; inp.click(); });
    }
    let activePanel=null;
    function showColorPicker(cmd){
      if(activePanel) activePanel.remove();
      const colors=['#000000','#ffffff','#ff0000','#ff8c00','#ffd700','#008000','#00ced1','#0000ff','#800080'];
      const panel=document.createElement('div'); panel.className='color-picker-panel';
      colors.forEach(c=>{ let swatch=document.createElement('div'); swatch.className='color-option'; swatch.style.backgroundColor=c; swatch.addEventListener('click',()=>{ document.execCommand(cmd,false,c); document.getElementById('noteEditor').focus(); panel.remove(); activePanel=null; }); panel.appendChild(swatch); });
      document.body.appendChild(panel); activePanel=panel;
      setTimeout(()=>{ document.addEventListener('click',function close(e){ if(!panel.contains(e.target)){ panel.remove(); activePanel=null; document.removeEventListener('click',close); } }); },10);
    }

    // ========== 待办模块 ==========
    function renderTodoCategories(){
      const container=document.getElementById('todoCategoriesContainer');
      container.innerHTML = todoCategories.map(cat => `<div class="cat-tab ${currentTodoCat===cat?'active':''}" data-cat="${cat}">${cat}</div>`).join('') + '<button id="addCategoryBtn" class="add-cat-btn">➕ 分类</button>';
      document.querySelectorAll('.cat-tab').forEach(el=>el.addEventListener('click',()=>{ currentTodoCat=el.dataset.cat; renderTodoCategories(); renderTodoItems(); haptic(); }));
      document.getElementById('addCategoryBtn').onclick=()=>{ let newCat=prompt('新分类'); if(newCat&&!todoCategories.includes(newCat)){ todoCategories.push(newCat); saveAll(); renderTodoCategories(); } };
    }
    function renderTodoItems(){
      const filtered=todos.filter(t=>t.category===currentTodoCat);
      const container=document.getElementById('todoItemsContainer');
      if(!filtered.length){ container.innerHTML='<div style="text-align:center; padding:12px;">✨ 暂无待办</div>'; return; }
      container.innerHTML=filtered.map(todo=>`<div class="todo-item" data-id="${todo.id}"><input type="checkbox" ${todo.completed?'checked':''}><input type="text" class="todo-text ${todo.completed?'completed':''}" value="${escapeHtml(todo.text)}"><button class="delete-todo">🗑️</button></div>`).join('');
      container.querySelectorAll('.todo-item').forEach(item=>{
        const id=parseInt(item.dataset.id);
        const chk=item.querySelector('input[type="checkbox"]');
        const txt=item.querySelector('.todo-text');
        const del=item.querySelector('.delete-todo');
        chk.addEventListener('change',()=>{
          const todo=todos.find(t=>t.id===id);
          if(todo){ todo.completed=chk.checked; if(todo.completed) txt.classList.add('completed'); else txt.classList.remove('completed'); saveAll(); }
        });
        txt.addEventListener('blur',()=>{ const todo=todos.find(t=>t.id===id); if(todo) todo.text=txt.value; saveAll(); });
        del.addEventListener('click',()=>{ todos=todos.filter(t=>t.id!==id); saveAll(); renderTodoItems(); });
      });
    }
    function addNewTodo(){ const text=document.getElementById('newTodoText').value.trim(); if(text){ todos.push({ id:Date.now(), text, completed:false, category:currentTodoCat }); saveAll(); renderTodoItems(); document.getElementById('newTodoText').value=''; haptic(); } }

    // ========== 密码锁、主题 ==========
    function showLock(callback){
      if(!passwordEnabled||isUnlocked){ if(callback) callback(); return; }
      const div=document.createElement('div'); div.className='lock-overlay'; let temp='';
      div.innerHTML=`<div style="background:#fff0df; border-radius:48px; padding:24px; text-align:center;"><h3>🔐 请输入6位密码</h3><div style="font-size:2rem; letter-spacing:8px; margin:16px;" id="lockInput">______</div><div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:16px 0;" id="lockNumpad"></div><div><button id="lockOkBtn" style="background:#b8e0b0; border:none; border-radius:60px; padding:10px 24px; margin-right:12px;">确认</button><button id="lockCancelBtn" style="background:#ffc2a1; border:none; border-radius:60px; padding:10px 24px;">取消</button></div></div>`;
      document.body.appendChild(div);
      const inputSpan=div.querySelector('#lockInput');
      const numpad=div.querySelector('#lockNumpad');
      for(let i=1;i<=9;i++){ let b=document.createElement('button'); b.textContent=i; b.style.padding='12px'; b.style.borderRadius='60px'; b.style.border='none'; b.style.background='#fff'; b.onclick=()=>{ if(temp.length<6){ temp+=i; inputSpan.textContent=temp.padEnd(6,'_'); } }; numpad.appendChild(b); }
      let b0=document.createElement('button'); b0.textContent='0'; b0.style.padding='12px'; b0.style.borderRadius='60px'; b0.onclick=()=>{ if(temp.length<6){ temp+='0'; inputSpan.textContent=temp.padEnd(6,'_'); } }; numpad.appendChild(b0);
      let delBtn=document.createElement('button'); delBtn.textContent='⌫'; delBtn.style.padding='12px'; delBtn.style.borderRadius='60px'; delBtn.onclick=()=>{ temp=temp.slice(0,-1); inputSpan.textContent=temp.padEnd(6,'_'); }; numpad.appendChild(delBtn);
      div.querySelector('#lockOkBtn').onclick=()=>{ if(temp===savedPassword){ isUnlocked=true; document.body.removeChild(div); if(callback) callback(); } else { alert('密码错误'); temp=''; inputSpan.textContent='______'; } };
      div.querySelector('#lockCancelBtn').onclick=()=>{ document.body.removeChild(div); };
    }
    function setTheme(theme){
      document.body.classList.remove('theme-mint','theme-sky');
      if(theme==='mint') document.body.classList.add('theme-mint');
      else if(theme==='sky') document.body.classList.add('theme-sky');
      localStorage.setItem(THEME_KEY,theme);
    }

    function confirmClearAllData() {
      const modal = document.createElement('div');
      modal.className = 'lock-overlay';
      modal.style.zIndex = '4000';
      modal.innerHTML = `
        <div style="background:#fff6e8; border-radius:48px; padding:24px; width:280px; text-align:center;">
          <h3 style="color:#b3415c;">⚠️ 清空所有数据</h3>
          <p style="margin:16px 0; color:#2d1b3a;">此操作不可恢复，请输入 <strong style="color:#e06c3c;">确认删除</strong> 以继续</p>
          <input type="text" id="confirmClearInput" placeholder="确认删除" style="width:100%; padding:10px; border-radius:60px; border:2px solid #f7ad6a; margin-bottom:16px;">
          <div style="display:flex; gap:12px;">
            <button id="confirmClearOk" class="add-btn" style="flex:1;">确定</button>
            <button id="confirmClearCancel" class="add-btn" style="background:#ffc2a1; flex:1;">取消</button>
          </div>
        </div>
      `;
      document.body.appendChild(modal);
      const input = modal.querySelector('#confirmClearInput');
      const okBtn = modal.querySelector('#confirmClearOk');
      const cancelBtn = modal.querySelector('#confirmClearCancel');
      okBtn.onclick = () => {
        if(input.value === '确认删除') {
          localStorage.clear();
          location.reload();
        } else {
          alert('输入文字不正确');
        }
      };
      cancelBtn.onclick = () => document.body.removeChild(modal);
      input.focus();
    }

    function switchView(view){
      if(passwordEnabled && !isUnlocked && view!=='settings'){ showLock(()=>switchView(view)); return; }
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      document.getElementById(view+'View').classList.add('active');
      document.querySelectorAll('.nav-item').forEach(i=>i.classList.toggle('active',i.dataset.view===view));
      if(view==='calendar') renderWorkCalendar();
      if(view==='girlCalendar'){ renderGirlCalendar(); if(girlCurrentMode==='important') renderImportantList(); }
      if(view==='bookkeeping') refreshBookkeepingUI();
      haptic();
    }

    function initAll(){
      loadAll();
      updatePasswordLockStatus();
      document.getElementById('themeDefaultBtn').onclick=()=>setTheme('default');
      document.getElementById('themeMintBtn').onclick=()=>setTheme('mint');
      document.getElementById('themeSkyBtn').onclick=()=>setTheme('sky');
      
      for(let y=new Date().getFullYear()-5;y<=new Date().getFullYear()+5;y++) document.getElementById('workYearSelect').add(new Option(y,y));
      document.getElementById('workYearSelect').value=workDisplayYear;
      for(let m=1;m<=12;m++) document.getElementById('workMonthSelect').add(new Option(m,m));
      document.getElementById('workMonthSelect').value=workDisplayMonth+1;
      document.getElementById('workYearSelect').onchange=()=>{ workDisplayYear=parseInt(document.getElementById('workYearSelect').value); renderWorkCalendar(); };
      document.getElementById('workMonthSelect').onchange=()=>{ workDisplayMonth=parseInt(document.getElementById('workMonthSelect').value)-1; renderWorkCalendar(); };
      renderCategoryList(); renderCategorySelect(); renderWorkCalendar();
      document.getElementById('addWorkRecordBtn').onclick = addWorkRecordFromForm;
      document.getElementById('addCategoryBtn').onclick = addNewCategory;
      const collapseHeader = document.getElementById('collapseHeader');
      const collapseContent = document.getElementById('collapseContent');
      collapseHeader.onclick = () => collapseContent.classList.toggle('show');
      document.getElementById('closeModalBtn').onclick=closeModal;
      document.getElementById('dayModal').onclick=e=>{ if(e.target===document.getElementById('dayModal')) closeModal(); };
      initGirlCalendar();
      document.getElementById('prevMonthBk').onclick=()=>changeBkMonth(-1);
      document.getElementById('nextMonthBk').onclick=()=>changeBkMonth(1);
      document.getElementById('addBkBtn').onclick=addBookkeeping;
      document.getElementById('manageRecordsBtn').onclick=showRecordModal;
      document.getElementById('closeRecordModalBtn').onclick=()=>document.getElementById('recordModal').classList.remove('show');
      document.querySelectorAll('#bkTypeToggle .type-btn').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('#bkTypeToggle .type-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentBkType=btn.dataset.type;
        renderBkCategoryGrid();
      }));
      renderBkCategoryGrid(); refreshBookkeepingUI();
      renderNoteCategories(); renderNoteCards(); 
      if(currentNoteId) loadNoteToEditor(); else { document.getElementById('noteTitleInput').value = ''; document.getElementById('noteEditor').innerHTML = ''; }
      document.getElementById('newNoteBtn').onclick=newNote;
      document.getElementById('saveNoteBtn').onclick=saveCurrentNote;
      renderTodoCategories(); renderTodoItems();
      document.getElementById('addTodoBtn').onclick=addNewTodo;
      bindNoteToolbar();
      const noteTabBtns = document.querySelectorAll('.note-tab');
      const notePanel = document.getElementById('notePanel');
      const todoPanel = document.getElementById('todoPanel');
      noteTabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const tab = btn.dataset.tab;
          noteTabBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          if(tab === 'note'){
            notePanel.classList.add('active');
            todoPanel.classList.remove('active');
            renderNoteCards();
          } else {
            notePanel.classList.remove('active');
            todoPanel.classList.add('active');
            renderTodoCategories(); renderTodoItems();
          }
        });
      });
      document.querySelectorAll('.nav-item').forEach(item=>item.addEventListener('click',()=>switchView(item.dataset.view)));
      document.getElementById('exportDataBtn').onclick=()=>{ const data={records,workCategories,bkRecords,notes:{categories:noteCategories,notes},todoCategories,todos,menstrualData,cycleLength,periodDays,importantDays}; const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'})); a.download=`backup_${Date.now()}.json`; a.click(); };
      document.getElementById('importDataBtn').onclick=()=>{ const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json'; inp.onchange=e=>{ const f=e.target.files[0]; const reader=new FileReader(); reader.onload=ev=>{ const d=JSON.parse(ev.target.result); if(d.records) records=d.records; if(d.workCategories) workCategories=d.workCategories; if(d.bkRecords) bkRecords=d.bkRecords; if(d.notes){ noteCategories=d.notes.categories||noteCategories; notes=d.notes.notes||notes; } if(d.todoCategories) todoCategories=d.todoCategories; if(d.todos) todos=d.todos; if(d.menstrualData) menstrualData=d.menstrualData; if(d.cycleLength) cycleLength=d.cycleLength; if(d.periodDays) periodDays=d.periodDays; if(d.importantDays) importantDays=d.importantDays; saveAll(); renderWorkCalendar(); refreshBookkeepingUI(); renderNoteCategories(); renderNoteCards(); loadNoteToEditor(); renderTodoCategories(); renderTodoItems(); initGirlCalendar(); alert('导入成功'); }; reader.readAsText(f); }; inp.click(); };
      document.getElementById('clearAllDataBtn').onclick=confirmClearAllData;
      document.getElementById('togglePasswordLockBtn').onclick=()=>{ let pwd=prompt('设置6位数字密码'); if(pwd&&/^\d{6}$/.test(pwd)){ savedPassword=pwd; passwordEnabled=true; saveAll(); isUnlocked=false; updatePasswordLockStatus(); alert('密码已启用'); showLock(); } else alert('密码必须为6位数字'); };
      document.getElementById('disablePasswordLockBtn').onclick=()=>{ passwordEnabled=false; saveAll(); isUnlocked=true; updatePasswordLockStatus(); alert('密码锁已关闭'); };
      if(passwordEnabled && !isUnlocked) showLock();
    }
    initAll();
  })();
</script>
</body>
